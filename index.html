<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>n3sk Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
#waiting{text-align:center}
.loader{width:40px;height:40px;border:3px solid #333;border-top-color:#c73030;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-text{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:8px}
.wait-sub{font-size:11px;color:#555; margin-top: 5px;}
#app{display:none;width:100%;height:100%;padding:20px;text-align:center}
.token-display{background:#111;border:1px solid #333;padding:8px 16px;border-radius:4px;font-family:monospace;font-size:14px;color:#c73030;margin-top:10px;display:inline-block}
</style>
</head>
<body>

<div id="waiting">
    <div class="loader"></div>
    <p class="wait-text" id="status">INICIALIZANDO...</p>
    <p class="wait-sub" id="sub">Gerando identidade do dispositivo...</p>
</div>

<div id="app">
    <h2 style="color:#4ade80;margin-bottom:10px">● CONECTADO</h2>
    <p>Sessão Ativa:</p>
    <div class="token-display" id="displayToken">-</div>
    <p style="margin-top:30px;color:#555;font-size:12px">Controle total ativado.</p>
</div>

<script>
const SUPA = 'https://gkzxuerurfedfwuxhimf.supabase.co';
const KEY = 'sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6';
const TBL = 'n3sk';

// Gera DeviceID robusto via Canvas Fingerprinting
async function getDeviceId() {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top";
        ctx.font = "14px 'Arial'";
        ctx.fillText("n3sk-fingerprint-" + navigator.userAgent + screen.width + screen.height, 2, 2);
        const dataUrl = canvas.toDataURL();
        
        let hash = 0;
        for (let i = 0; i < dataUrl.length; i++) {
            const char = dataUrl.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0;
        }
        return 'DEV-' + Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
    } catch(e) {
        return 'DEV-FALLBACK-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    }
}

let DEVICE_ID = '';
let LINKED_TOKEN = localStorage.getItem('n3sk_linked_token');
let CONNECTED = false;

// Função CORRETA para atualizar device_id no Supabase
async function bindDevice(token) {
    console.log(`[BIND] Tentando vincular ${token} ao device ${DEVICE_ID}`);
    
    // Usa PATCH para atualizar a linha existente
    const res = await fetch(`${SUPA}/rest/v1/${TBL}?id=eq.${token}`, {
        method: 'PATCH',
        headers: { 
            'apikey': KEY, 
            'Authorization': `Bearer ${KEY}`, 
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal' 
        },
        body: JSON.stringify({ device_id: DEVICE_ID })
    });

    if (!res.ok) {
        console.error("[BIND] Erro ao vincular:", res.status, await res.text());
        document.getElementById('sub').innerText = `Erro ao vincular: ${res.status}`;
        return false;
    }
    console.log("[BIND] Sucesso!");
    return true;
}

async function fetchActiveSession() {
    const res = await fetch(`${SUPA}/rest/v1/${TBL}?is_active=eq.true&order=created_at.desc&limit=1&select=id,token,device_id,state,is_active`, {
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    const data = await res.json();
    return data.length > 0 ? data[0] : null;
}

async function fetchSpecificSession(token) {
    const res = await fetch(`${SUPA}/rest/v1/${TBL}?id=eq.${token}&select=id,token,device_id,state,is_active`, {
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    const data = await res.json();
    return data.length > 0 ? data[0] : null;
}

function connect(session) {
    if (!CONNECTED) {
        CONNECTED = true;
        localStorage.setItem('n3sk_linked_token', session.id);
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('displayToken').textContent = session.id;
    }
}

async function init() {
    DEVICE_ID = await getDeviceId();
    document.getElementById('sub').innerText = `Meu ID: ${DEVICE_ID}`;
    
    // PRIORIDADE 1: Verifica token salvo no LocalStorage
    if (LINKED_TOKEN) {
        document.getElementById('status').textContent = 'VERIFICANDO SESSÃO...';
        const session = await fetchSpecificSession(LINKED_TOKEN);
        
        if (session && session.is_active) {
            // SEGURANÇA CRÍTICA: Só conecta se device_id bater EXATAMENTE
            if (session.device_id === DEVICE_ID) {
                connect(session);
                startPolling(LINKED_TOKEN);
                return;
            } else {
                // Token pertence a outro dispositivo
                localStorage.removeItem('n3sk_linked_token');
                LINKED_TOKEN = null;
                document.getElementById('status').textContent = 'ACESSO NEGADO';
                document.getElementById('sub').textContent = 'Esta sessão pertence a outro PC.';
            }
        } else {
            // Sessão deletada
            localStorage.removeItem('n3sk_linked_token');
            LINKED_TOKEN = null;
            document.getElementById('status').textContent = 'LOADER FECHADO';
            document.getElementById('sub').textContent = 'Reinicie o C# para nova sessão.';
        }
    }

    // PRIORIDADE 2: Busca sessão ativa PARA VINCULAÇÃO INICIAL
    document.getElementById('status').textContent = 'AGUARDANDO LOADER...';
    const active = await fetchActiveSession();
    
    if (active && active.device_id === null) {
        // Primeira conexão: vincula este dispositivo
        document.getElementById('status').textContent = 'VINCULANDO DISPOSITIVO...';
        const success = await bindDevice(active.id);
        
        if (success) {
            localStorage.setItem('n3sk_linked_token', active.id);
            LINKED_TOKEN = active.id;
            connect(active);
            startPolling(active.id);
            return;
        }
    }
    
    // Se active.device_id existe e é diferente, IGNORA COMPLETAMENTE
    setTimeout(init, 2000);
}

async function startPolling(token) {
    setInterval(async () => {
        const session = await fetchSpecificSession(token);
        if (!session || !session.is_active) {
            CONNECTED = false;
            localStorage.removeItem('n3sk_linked_token');
            LINKED_TOKEN = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('status').textContent = 'PC OFFLINE';
            document.getElementById('sub').textContent = 'Loader fechado.';
            setTimeout(init, 3000);
            return;
        }
    }, 500);
}

init();
</script>
</body>
</html>
