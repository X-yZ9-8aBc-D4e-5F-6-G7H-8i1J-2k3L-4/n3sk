<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'>
    <meta name='color-scheme' content='light dark'>
    <title>n3sk</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root{ 
            --red:#c73030;
            --bg:#0a0a0a;
            --bg2:#111;
            --bg3:#1a1a1a;
            --border:#8b2e2e;
            --text:#e0e0e0;
            --muted:#888; 
            color-scheme: light dark;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        /* CURSOR ORIGINAL */
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;cursor:none}
        @media(hover:hover){ 
            body { cursor: none; }
            #cur{position:fixed;width:18px;height:18px;border:2px solid rgba(199,48,48,.9);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform .12s ease,border-color .15s ease} 
            #cur.ck{transform:translate(-50%,-50%) scale(.65);border-color:#ff6b6b} 
        }
        @media(hover:none), (max-width: 900px){ 
            * { cursor: auto !important; } 
            #cur{display:none !important} 
        }

        #app{display:none;height:100%}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.7)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
        @keyframes floatUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .wrap{display:flex;height:100%;gap:12px;padding:12px;animation:fadeIn .5s ease}
        .sidebar{width:240px;flex-shrink:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px;}
        .profile-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
        .profile-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--red);box-shadow:0 0 10px rgba(199,48,48,0.3)}
        .profile-info{display:flex;flex-direction:column;gap:2px}
        .profile-name{font-size:14px;font-weight:700;color:#fff}
        .profile-sub{font-size:10px;color:var(--muted);letter-spacing:0.5px}
        .logo{text-align:center;padding:10px 0 16px;border-bottom:1.5px solid var(--border)}
        .stat-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--bg3);border-radius:6px;border:1.5px solid #333}
        .stat-dot{width:10px;height:10px;border-radius:50%;background:#444;transition:all .3s}
        .stat-dot.on{background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s infinite}
        .stat-txt{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;transition:color .3s}
        .stat-txt.on{color:#4ade80}

        .btn-global-qr {
            width: 100%; padding: 12px; background: transparent; border: 1.5px solid #c73030;
            color: #c73030; font-weight: bold; letter-spacing: 1px; border-radius: 8px;
            cursor: pointer; transition: all 0.3s; font-size: 11px; text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-global-qr:hover { background: #c73030; color: white; box-shadow: 0 0 15px rgba(199,48,48,0.4); }

        .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
        .main::-webkit-scrollbar{width:3px} .main::-webkit-scrollbar-thumb{background:#333;border-radius:99px}

        .panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
        .ph{background:var(--border);padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:2px;color:#fff}
        .pgrid{display:grid;gap:0}
        .row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #1c1c1c}
        .row:last-child{border-bottom:none} .row span{font-size:12px;color:var(--text)}

        .preview-panel{width:420px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
        .preview-canvas{flex:1;background:#050505;width:100%;height:100%;display:block}

        /* TOGGLE ORIGINAL */
        .tgl{width:46px;height:26px;background:#2a2a2a;border-radius:99px;position:relative;border:1.5px solid #444;transition:all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);user-select:none;flex-shrink:0}
        .tgl.on{background:var(--red);border-color:#ff6b6b;box-shadow:0 0 8px rgba(199,48,48,.4)}
        .tgl::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#ffffff;top:2px;left:2px;transition:all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);box-shadow:0 1px 4px rgba(0,0,0,.5)}
        .tgl.on::after{left:22px}

        /* SWATCH SVG ORIGINAL */
        .sw-container {
            width: 36px; height: 24px; flex-shrink: 0; border-radius: 4px; overflow: hidden;
            border: 1.5px solid #555; position: relative; cursor: pointer; isolation: isolate; 
        }
        .sw-svg { width: 100%; height: 100%; display: block; mix-blend-mode: normal !important; }

        /* COLOR PICKER OVERLAY ORIGINAL */
        .cp-ol{display:none;position:fixed;inset:0;z-index:9000} .cp-ol.open{display:block}
        .cp-box{position:fixed;background:#161616;border:1.5px solid var(--border);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start;z-index:901;box-shadow:0 16px 48px rgba(0,0,0,.9);user-select:none;touch-action:none}
        .sv{width:190px;height:152px;border-radius:5px;position:relative;overflow:hidden;flex-shrink:0;border:1px solid #222}
        .sv-w{position:absolute;inset:0;background:linear-gradient(to right,#fff,transparent)}
        .sv-b{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000)}
        /* SMOOTH NAS BOLINHAS */
        .sv-th{position:absolute;width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 1.5px rgba(0,0,0,.7),0 2px 5px rgba(0,0,0,.8); transition: left 0.05s linear, top 0.05s linear;}
        .bars{display:flex;gap:8px}
        .btr{position:relative;width:14px;height:152px;border-radius:99px;overflow:visible;flex-shrink:0;border:1px solid #222}
        .bin{position:absolute;inset:0;border-radius:99px;overflow:hidden}
        .bh{width:100%;height:100%;background:linear-gradient(to bottom,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%)}
        .bck{width:100%;height:100%;background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/8px 8px}
        .bag{position:absolute;inset:0;border-radius:99px;pointer-events:none}
        .bth{position:absolute;left:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-radius:50%;background:#fff;border:2.5px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.6),0 2px 5px rgba(0,0,0,.7);pointer-events:none;z-index:10; transition: top 0.05s linear, background 0.05s linear;}

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
            font-family: 'Segoe UI', sans-serif; color: white;
        }
        .login-card {
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px);
            padding: 50px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6); text-align: center; max-width: 340px; width: 100%;
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .login-card h1 { font-size: 32px; margin: 0 0 15px; letter-spacing: 3px; text-transform: uppercase; font-weight: 800; }
        .login-card h1 span { color: var(--red); text-shadow: 0 0 20px rgba(199, 48, 48, 0.4); }
        .login-card p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .login-card.error { border-color: var(--red); }
        .loader {
            width: 40px; height: 40px; margin: 0 auto;
            border: 4px solid #333; border-top: 4px solid var(--red); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* QR MODAL */
        #qr-modal {
            position: fixed; inset: 0; z-index: 99998;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        }
        #qr-modal.active { display: flex; }
        .qr-modal-content {
            background: #111; padding: 40px; border-radius: 20px; border: 1.5px solid var(--red);
            text-align: center; color: white; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .qr-modal-content h2 { margin: 0 0 10px; color: var(--red); letter-spacing: 2px; }
        .qr-modal-content p { color: #aaa; font-size: 13px; margin-bottom: 20px; }
        #qrcode-global { display: inline-block; padding: 15px; background: white; border-radius: 12px; margin-bottom: 20px; }
        #qrcode-global img, #qrcode-global canvas { display: block; margin: 0 auto; }
        .qr-close-btn {
            background: var(--red); color: white; border: none; padding: 10px 30px;
            border-radius: 8px; font-weight: bold; cursor: pointer; letter-spacing: 1px;
            transition: background 0.2s;
        }
        .qr-close-btn:hover { background: #ff6b6b; }

        @media(max-width:900px){
          html, body { height: auto; min-height: 100%; overflow-y: auto; }
          .wrap{flex-direction:column;padding:8px;gap:8px; height: auto; min-height: 100%;}
          .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;gap:10px;padding:12px; order: 1;}
          .profile-card{flex:1 1 100%;}
          .logo{padding:8px 0 10px;flex:1 1 100%;}
          .stat-box{flex:1}
          .main{flex:none; order: 2; width: 100%;}
          .preview-panel{width:100%; height: 60vh; min-height: 500px; order: 3; flex-shrink: 0; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

<!-- CURSOR -->
<div id='cur'></div>

<script>
// ============================================
// CONFIGURAÇÃO SUPABASE
// ============================================
const SUPA_URL = "https://gkzxuerurfedfwuxhimf.supabase.co";
const SUPA_KEY = "sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6";
const client = supabase.createClient(SUPA_URL, SUPA_KEY);
const PREVIEW_IMG_URL = 'https://media.discordapp.net/attachments/1184323047931531294/1519504042357817424/Screenshot_111.png?ex=6a3dcbea&is=6a3c7a6a&hm=95ab23192fdc65d73e612fadc773aac107802e9a93602097a289073aabc498b2&=&format=webp&quality=lossless&width=800&height=968';

let sessionId = null;
let isGlobal = false;
let bgImage = null;
let isUpdatingLocally = false; // TRAVA PARA EVITAR BUG DE TOGGLE

// ============================================
// CURSOR (INICIA IMEDIATAMENTE)
// ============================================
(function(){
    const cur = document.getElementById('cur');
    if(!cur || window.innerWidth <= 900) return; 
    
    let mx = window.innerWidth/2, my = window.innerHeight/2;
    let cx = mx, cy = my;
    
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, {passive:true});
    document.addEventListener('mousedown', () => cur.classList.add('ck'));
    document.addEventListener('mouseup', () => cur.classList.remove('ck'));
    
    function loop(){
        cx += (mx-cx)*0.13;
        cy += (my-cy)*0.13;
        cur.style.left = cx+'px';
        cur.style.top = cy+'px';
        requestAnimationFrame(loop);
    }
    loop();
})();

// ============================================
// INICIALIZAÇÃO
// ============================================
window.onload = async function(){
    if(PREVIEW_IMG_URL){
        bgImage = new Image();
        bgImage.crossOrigin = "Anonymous";
        bgImage.src = PREVIEW_IMG_URL;
        bgImage.onload = () => scheduleRender();
    }

    const token = new URLSearchParams(window.location.search).get('token');
    if(!token){ showLoginError("Token não encontrado"); return; }
    
    try{
        const {data, error} = await client.from('n3sk').select('*').eq('token', token).eq('is_active', true).single();
        if(error || !data){ showLoginError("Token inválido ou expirado"); return; }
        
        sessionId = data.id;
        isGlobal = data.is_global;
        
        if(!isGlobal && data.ip && data.ip !== "UNKNOWN"){
            try{
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                if(ipData.ip !== data.ip){ showLoginError("Acesso negado - Dispositivo diferente"); return; }
            }catch(e){ console.warn("IP check failed", e); }
        }
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setConn(true);
        startSync();
        resizeCanvas();
        scheduleRender();
    }catch(e){ showLoginError("Erro: "+e.message); }
};

function showLoginError(msg){
    document.getElementById('login-msg').textContent = msg;
    document.getElementById('login-loader').style.display = 'none';
    document.querySelector('.login-card').style.borderColor = 'var(--red)';
}

// ============================================
// TOGGLES (BLINDADO CONTRA BUG)
// ============================================
function tg(el){
    el.classList.toggle('on'); 
    scheduleRender();
    sendState(); // Envia imediatamente sem debounce
}

// ============================================
// COLOR PICKER ORIGINAL (TEMPO REAL + SMOOTH)
// ============================================
var cpTarget=null,cpH=0,cpS=1,cpV=1,cpA=1;
var svTX=1,svTY=0,svCX=1,svCY=0;
var hTY=0,hCY=0,aCY=0; 
var animRun=false;
var cpOl=document.getElementById('cpOl'), cpBox=document.getElementById('cpBox');
var svEl=document.getElementById('sv'), svTh=document.getElementById('svTh');
var hueTr=document.getElementById('hueTr'), hueTh=document.getElementById('hueTh');
var aTr=document.getElementById('aTr'), aGr=document.getElementById('aGr'), aTh=document.getElementById('aTh');

function h2r(h,s,v){
  var r,g,b,i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return[Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}
function r2h(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function hex2hsv(hex){
  var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h,s=mx===0?0:d/mx,v=mx;
  if(d===0)h=0;else if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;
  return[h/6,s,v];
}
function lerp(a,b,t){return a+(b-a)*t}

function runAnim(){
  var sp=0.28;
  svCX=lerp(svCX,svTX,sp);svCY=lerp(svCY,svTY,sp);
  hCY=lerp(hCY,hTY,sp);
  svTh.style.left=(svCX*100)+'%';svTh.style.top=(svCY*100)+'%';
  var hH=hueTr.getBoundingClientRect().height||152;
  var aH=aTr.getBoundingClientRect().height||152;
  hueTh.style.top=(hCY*hH)+'px';
  aTh.style.top=(aCY*aH)+'px';
  if(Math.abs(svCX-svTX)>.0005||Math.abs(svCY-svTY)>.0005||Math.abs(hCY-hTY)>.0005)
    requestAnimationFrame(runAnim);
  else animRun=false;
}
function startAnim(){if(!animRun){animRun=true;requestAnimationFrame(runAnim);}}

function updateCP(){
  var rgb=h2r(cpH,cpS,cpV),hRgb=h2r(cpH,1,1),hHex=r2h(hRgb[0],hRgb[1],hRgb[2]);
  svEl.style.background=hHex;
  svTh.style.background=r2h(rgb[0],rgb[1],rgb[2]);
  aGr.style.background='linear-gradient(to bottom,'+hHex+',transparent)';
  hueTh.style.background=hHex;
  aTh.style.background='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+cpA+')';
  if(cpTarget){
    var hex=r2h(rgb[0],rgb[1],rgb[2]);
    // Atualiza o atributo 'fill' do SVG igual ao original
    var rect = cpTarget.querySelector('rect');
    if(rect) rect.setAttribute('fill', hex);
    scheduleRender();
  }
}

function openCP(el){
  cpTarget=el;
  var rect=el.getBoundingClientRect(),popW=240,popH=190;
  var left=rect.right+10,top=rect.top;
  if(left+popW>innerWidth)left=rect.left-popW-10;
  if(top+popH>innerHeight)top=innerHeight-popH-10;
  if(left<4)left=4;if(top<4)top=4;
  cpBox.style.left=left+'px';cpBox.style.top=top+'px';

  // Pega a cor atual do SVG
  var svgRect = el.querySelector('rect');
  var currentColor = svgRect ? svgRect.getAttribute('fill') : '#ff0000';

  if(currentColor){
      var hsv=hex2hsv(currentColor);
      cpH=hsv[0];cpS=hsv[1];cpV=hsv[2];cpA=1;
  }

  svCX=cpS;svTX=cpS;svCY=1-cpV;svTY=1-cpV;hCY=cpH;hTY=cpH;aCY=1-cpA;
  updateCP();
  svTh.style.left=(svCX*100)+'%';svTh.style.top=(svCY*100)+'%';
  var hH=hueTr.getBoundingClientRect().height||152;
  var aH=aTr.getBoundingClientRect().height||152;
  hueTh.style.top=(hCY*hH)+'px';
  aTh.style.top=(aCY*aH)+'px';
  cpOl.classList.add('open');
}

cpOl.addEventListener('mousedown',function(e){
  if(e.target===cpOl){cpOl.classList.remove('open');sendState();}
});
cpOl.addEventListener('touchstart',function(e){
  if(e.target===cpOl){cpOl.classList.remove('open');sendState();}
},{passive:true});

var dSV=false,dH=false,dA=false;
function cl(v,a,b){return Math.max(a,Math.min(b,v))}

svEl.addEventListener('mousedown',function(e){e.preventDefault();dSV=true;doSV(e)});
hueTr.addEventListener('mousedown',function(e){e.preventDefault();dH=true;doH(e)});
aTr.addEventListener('mousedown',function(e){e.preventDefault();dA=true;doA(e)});
document.addEventListener('mousemove',function(e){if(dSV)doSV(e);if(dH)doH(e);if(dA)doA(e)});
document.addEventListener('mouseup',function(){ dSV=false;dH=false;dA=false; sendState(); });

function doSV(e){var r=svEl.getBoundingClientRect();cpS=cl((e.clientX-r.left)/r.width,0,1);cpV=cl(1-(e.clientY-r.top)/r.height,0,1);svTX=cpS;svTY=1-cpV;updateCP();startAnim();}
function doH(e){var r=hueTr.getBoundingClientRect();cpH=cl((e.clientY-r.top)/r.height,0,.9999);hTY=cpH;updateCP();startAnim();}
function doA(e){
    var r=aTr.getBoundingClientRect();
    var height = r.height || 152;
    cpA = cl(1 - ((e.clientY - r.top) / height), 0, 1);
    aCY = 1 - cpA; 
    updateCP();
    startAnim();
}

function tm(e){return{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}}
svEl.addEventListener('touchstart',function(e){e.preventDefault();dSV=true;doSV(tm(e))},{passive:false});
hueTr.addEventListener('touchstart',function(e){e.preventDefault();dH=true;doH(tm(e))},{passive:false});
aTr.addEventListener('touchstart',function(e){e.preventDefault();dA=true;doA(tm(e))},{passive:false});
document.addEventListener('touchmove',function(e){
  if(dSV||dH||dA){e.preventDefault();var m=tm(e);if(dSV)doSV(m);if(dH)doH(m);if(dA)doA(m);}
},{passive:false});
document.addEventListener('touchend',function(){ dSV=false;dH=false;dA=false; sendState(); });

// ============================================
// SYNC & STATE (ZERO DELAY + PROTEÇÃO)
// ============================================
async function startSync(){
    setInterval(async () => {
        if(!sessionId) return;
        const {data, error} = await client.from('n3sk').select('state, is_active').eq('id', sessionId).single();
        if(error || !data || !data.is_active){ location.reload(); return; }
        if(data.state) applyState(data.state);
    }, 500);
}

async function sendState(){
    if(!sessionId) return;
    
    isUpdatingLocally = true;
    setTimeout(() => { isUpdatingLocally = false; }, 300);

    const state = {
        toggles: {
            box: document.getElementById('tgl-box').classList.contains('on'),
            skeleton: document.getElementById('tgl-skeleton').classList.contains('on'),
            snapline: document.getElementById('tgl-snapline').classList.contains('on'),
            healthbar: document.getElementById('tgl-healthbar').classList.contains('on')
        },
        colors: {
            boxcolor: getSvgColor('sw-boxcolor'),
            skeletoncolor: getSvgColor('sw-skeletoncolor'),
            snaplinecolor: getSvgColor('sw-snaplinecolor'),
            healthbarcolor: getSvgColor('sw-healthbarcolor')
        },
        alphas: { boxalpha: cpA, skeletonalpha: 1, snaplinealpha: 1, healthbaralpha: 1 }
    };
    await client.from('n3sk').update({state}).eq('id', sessionId);
}

function getSvgColor(id) {
    var el = document.getElementById(id);
    var rect = el ? el.querySelector('rect') : null;
    return rect ? rect.getAttribute('fill') : '#ffffff';
}

function applyState(s){
    if(isUpdatingLocally) return;

    setConn(true);
    var tm={box:'tgl-box',skeleton:'tgl-skeleton',snapline:'tgl-snapline',healthbar:'tgl-healthbar'};
    for(var k in tm){
        var el=document.getElementById(tm[k]);
        if(el && s.toggles) el.classList.toggle('on', !!s.toggles[k]);
    }
    var cm={boxcolor:'sw-boxcolor',skeletoncolor:'sw-skeletoncolor',snaplinecolor:'sw-snaplinecolor',healthbarcolor:'sw-healthbarcolor'};
    for(var k in cm){
        var el=document.getElementById(cm[k]);
        if(el && s.colors && s.colors[k]){ 
            // Atualiza o SVG com a cor recebida igual ao original
            var rect = el.querySelector('rect');
            if(rect) rect.setAttribute('fill', s.colors[k]);
        }
    }
    if(s.alphas) {
        if(s.alphas.boxalpha !== undefined) cpA = s.alphas.boxalpha;
        aCY = 1 - cpA;
        var aH=aTr.getBoundingClientRect().height||152;
        if(aTh) aTh.style.top=(aCY*aH)+'px';
    }
    scheduleRender();
}

function setConn(c){
    var d=document.getElementById('dot'),t=document.getElementById('txt');
    if(c){d.classList.add('on');t.classList.add('on');t.textContent='CONECTADO';}
    else{d.classList.remove('on');t.classList.remove('on');t.textContent='OFFLINE';}
}

// ============================================
// QR CODE
// ============================================
function showGlobalQr(){
    const globalId = sessionId.includes('_GLOBAL') ? sessionId : sessionId + '_GLOBAL';
    client.from('n3sk').select('token').eq('id', globalId).single()
    .then(({data, error}) => {
        if(data && data.token){
            const globalLink = `https://n3sk.xyz/?token=${data.token}`;
            document.getElementById('qr-modal').classList.add('active');
            document.getElementById('qrcode-global').innerHTML = ''; 
            new QRCode(document.getElementById("qrcode-global"), {
                text: globalLink, width: 200, height: 200,
                colorDark: "#000000", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    });
}
function closeGlobalQr(){ document.getElementById('qr-modal').classList.remove('active'); }

// ============================================
// PREVIEW CANVAS ORIGINAL
// ============================================
var canvas = document.getElementById('espCanvas');
var ctx = canvas.getContext('2d', { alpha: false });
var canvasWidth = 0, canvasHeight = 0, renderScheduled = false;
var hpAnimTime = 0;
var boxOpacity = 0;
var targetBoxOpacity = 0;

function resizeCanvas() {
  var rect = canvas.parentElement.getBoundingClientRect();
  var nw = rect.width, nh = rect.height - 35; 
  var dpr = window.devicePixelRatio || 1;
  if (canvasWidth !== nw || canvasHeight !== nh) { 
      canvas.width = nw * dpr; canvas.height = nh * dpr; 
      canvas.style.width = nw + 'px'; canvas.style.height = nh + 'px';
      ctx.scale(dpr, dpr); canvasWidth = nw; canvasHeight = nh; scheduleRender(); 
  }
}
window.addEventListener('resize', resizeCanvas);
function scheduleRender() { if (!renderScheduled) { renderScheduled = true; requestAnimationFrame(renderPreview); } }

function renderPreview() {
  renderScheduled = false;
  if (!canvasWidth || !canvasHeight) return;
  ctx.save();
  ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
  ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
      var s = Math.min(canvasWidth / bgImage.width, canvasHeight / bgImage.height);
      var w = bgImage.width * s, h = bgImage.height * s;
      ctx.drawImage(bgImage, (canvasWidth - w)/2, (canvasHeight - h)/2, w, h);
  }

  var isBox = document.getElementById('tgl-box').classList.contains('on');
  var isHp = document.getElementById('tgl-healthbar').classList.contains('on');

  var bC = getSvgColor('sw-boxcolor');
  var hC = getSvgColor('sw-healthbarcolor');

  var bH = canvasHeight * 0.75, bW = bH * 0.45;
  var bX = (canvasWidth - bW) / 2, bY = (canvasHeight - bH) / 2 + 20;

  targetBoxOpacity = isBox ? 1 : 0;
  boxOpacity = lerp(boxOpacity, targetBoxOpacity, 0.05);

  if (boxOpacity > 0.01) {
    ctx.globalAlpha = boxOpacity;
    ctx.strokeStyle = bC; ctx.lineWidth = 2; var l = bW * 0.25;
    ctx.beginPath(); ctx.moveTo(bX, bY + l); ctx.lineTo(bX, bY); ctx.lineTo(bX + l, bY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bX + bW - l, bY); ctx.lineTo(bX + bW, bY); ctx.lineTo(bX + bW, bY + l); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bX, bY + bH - l); ctx.lineTo(bX, bY + bH); ctx.lineTo(bX + l, bY + bH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bX + bW - l, bY + bH); ctx.lineTo(bX + bW, bY + bH); ctx.lineTo(bX + bW, bY + bH - l); ctx.stroke();
    ctx.globalAlpha = 1.0;
  }

  if (isHp) {
    var bw = 6, bx = bX - 12; 
    hpAnimTime += 0.05; 
    var pulse = 0.5 + 0.5 * Math.sin(hpAnimTime * 2 * Math.PI * 0.3);
    var currentHpHeight = bH * pulse;
    ctx.fillStyle = 'rgba(15,15,15,0.8)'; ctx.fillRect(bx, bY, bw, bH);
    ctx.fillStyle = hC; ctx.fillRect(bx, bY + (bH - currentHpHeight), bw, currentHpHeight);
  }
  ctx.restore();
  if (Math.abs(boxOpacity - targetBoxOpacity) > 0.01 || isHp) scheduleRender();
}
</script>
