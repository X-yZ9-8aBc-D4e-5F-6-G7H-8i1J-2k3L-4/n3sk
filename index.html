<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'>
    <title>n3sk</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root{--red:#c73030;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#8b2e2e;--text:#e0e0e0;--muted:#888}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
        body{cursor:none!important}
        #cur{position:fixed;width:18px;height:18px;border:2px solid rgba(199,48,48,0.9);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform 0.12s ease}
        #cur.ck{transform:translate(-50%,-50%) scale(0.65)}
        #app{display:none;height:100%}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,0.7)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
        .wrap{display:flex;height:100%;gap:12px;padding:12px;animation:fadeIn 0.5s ease}
        .sidebar{width:240px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px}
        .profile-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
        .profile-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--red)}
        .profile-info{display:flex;flex-direction:column;gap:2px}
        .profile-name{font-size:14px;font-weight:700;color:#fff}
        .profile-sub{font-size:10px;color:var(--muted)}
        .logo{text-align:center;padding:10px 0 16px;border-bottom:1.5px solid var(--border)}
        .stat-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--bg3);border-radius:6px}
        .stat-dot{width:10px;height:10px;border-radius:50%;background:#444}
        .stat-dot.on{background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s infinite}
        .stat-txt{font-size:10px;font-weight:700;color:var(--muted)}
        .stat-txt.on{color:#4ade80}
        .btn-qr{width:100%;padding:12px;background:transparent;border:1.5px solid var(--red);color:var(--red);font-weight:700;border-radius:8px;cursor:pointer;margin-top:10px}
        .btn-qr:hover{background:var(--red);color:#fff}
        .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
        .panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
        .ph{background:var(--border);padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:2px;color:#fff}
        .row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #1c1c1c}
        .row:last-child{border-bottom:none}
        .tgl{width:46px;height:26px;background:#2a2a2a;border-radius:99px;position:relative;border:1.5px solid #444;transition:all 0.3s;cursor:pointer}
        .tgl.on{background:var(--red);border-color:#ff6b6b}
        .tgl::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:all 0.3s}
        .tgl.on::after{left:22px}
        .sw{width:36px;height:24px;border-radius:4px;border:1.5px solid #555;cursor:pointer}
        .preview{width:420px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
        .preview canvas{flex:1;background:#050505}
        #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#1a0505,#000);z-index:99999}
        .card{background:rgba(20,20,20,0.8);backdrop-filter:blur(12px);padding:50px 40px;border-radius:30px;border:1px solid rgba(255,255,255,0.08);text-align:center;animation:fadeIn 0.8s}
        .card h1{font-size:32px;margin-bottom:15px;letter-spacing:3px}
        .card h1 span{color:var(--red)}
        .card p{color:#aaa;margin-bottom:20px}
        .loader{width:40px;height:40px;margin:0 auto;border:4px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:99998}
        #qr-modal.active{display:flex}
        .qr-box{background:#111;padding:40px;border-radius:20px;border:1.5px solid var(--red);text-align:center}
        .qr-box h2{color:var(--red);margin-bottom:10px}
        .qr-box #qrcode{background:#fff;padding:15px;border-radius:12px;margin:20px auto;display:inline-block}
        .qr-close{background:var(--red);color:#fff;border:none;padding:10px 30px;border-radius:8px;font-weight:700;cursor:pointer}
    </style>
</head>
<body>

<div id="login"><div class="card"><h1>N3SK <span></span></h1><p id="msg">Validando...</p><div class="loader"></div></div></div>
<div id="qr-modal"><div class="qr-box"><h2>QR GLOBAL</h2><div id="qrcode"></div><button class="qr-close" onclick="closeQR()">FECHAR</button></div></div>
<div id="cur"></div>

<div id="app" style="display:none">
<div class="wrap">
  <div class="sidebar">
    <div class="profile-card">
      <img src="https://via.placeholder.com/100/c73030/ffffff?text=SP" class="profile-img">
      <div class="profile-info"><div class="profile-name">n3sk</div><div class="profile-sub">Fuck any Anti-cheat</div></div>
    </div>
    <div class="logo"></div>
    <div class="stat-box"><div class="stat-dot" id="dot"></div><div class="stat-txt" id="txt">OFFLINE</div></div>
    <button class="btn-qr" onclick="showQR()">GERAR QR GLOBAL</button>
  </div>
  <div class="main">
    <div class="panel">
      <div class="ph">ESP TOGGLES</div>
      <div class="row"><span>Draw box</span><div class="tgl on" id="tgl-box" onclick="tg(this)"></div></div>
      <div class="row"><span>Draw skeleton</span><div class="tgl on" id="tgl-skeleton" onclick="tg(this)"></div></div>
      <div class="row"><span>Draw snapline</span><div class="tgl" id="tgl-snapline" onclick="tg(this)"></div></div>
      <div class="row"><span>Draw healthbar</span><div class="tgl on" id="tgl-healthbar" onclick="tg(this)"></div></div>
    </div>
    <div class="panel">
      <div class="ph">ESP COLORS</div>
      <div class="row"><span>Box color</span><div class="sw" id="sw-boxcolor" onclick="alert('Color picker')" style="background:#ff0000"></div></div>
      <div class="row"><span>Skeleton color</span><div class="sw" id="sw-skeletoncolor" onclick="alert('Color picker')" style="background:#ffffff"></div></div>
      <div class="row"><span>Snapline color</span><div class="sw" id="sw-snaplinecolor" onclick="alert('Color picker')" style="background:#00ff00"></div></div>
      <div class="row"><span>Healthbar color</span><div class="sw" id="sw-healthbarcolor" onclick="alert('Color picker')" style="background:#00ff00"></div></div>
    </div>
  </div>
  <div class="preview"><div class="ph">Preview</div><canvas id="cvs"></canvas></div>
</div>
</div>

<script>
// CONFIGURAÇÃO SUPABASE - SEM REDECLARAR!
const SUPA_URL = "https://gkzxuerurfedfwuxhimf.supabase.co";
const SUPA_KEY = "sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6";
const client = supabase.createClient(SUPA_URL, SUPA_KEY);

let sessionId = null;
let isGlobal = false;

console.log("[INIT] Página carregada");

// INICIALIZAÇÃO
window.onload = async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    console.log("[INIT] Token:", token);
    
    if (!token) {
        document.getElementById('msg').textContent = "Token não encontrado";
        return;
    }
    
    try {
        const { data, error } = await client
            .from('n3sk')
            .select('*')
            .eq('token', token)
            .eq('is_active', true)
            .eq('is_global', false)
            .single();
        
        console.log("[INIT] Dados:", data);
        console.log("[INIT] Erro:", error);
        
        if (error || !data) {
            document.getElementById('msg').textContent = "Token inválido";
            return;
        }
        
        sessionId = data.id;
        isGlobal = data.is_global;
        
        console.log("[INIT] Session ID:", sessionId);
        console.log("[INIT] HWID:", data.hwid);
        console.log("[INIT] IP:", data.ip);
        
        // Validação de IP
        if (!isGlobal && data.ip && data.ip !== "UNKNOWN") {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                console.log("[INIT] Meu IP:", ipData.ip);
                if (ipData.ip !== data.ip) {
                    document.getElementById('msg').textContent = "Acesso negado - IP diferente";
                    return;
                }
            } catch (e) {
                console.warn("Não validou IP");
            }
        }
        
        // Mostrar app
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setConn(true);
        
        // Iniciar cursor
        initCursor();
        
        // Iniciar sync
        startSync();
        
        console.log("[INIT] App iniciado!");
    } catch (e) {
        console.error("[INIT] Erro:", e);
        document.getElementById('msg').textContent = "Erro: " + e.message;
    }
};

// CURSOR - CORRIGIDO
function initCursor() {
    const cur = document.getElementById('cur');
    if (!cur) {
        console.log("[CURSOR] Elemento não encontrado");
        return;
    }
    
    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx;
    let cy = my;
    
    console.log("[CURSOR] Ativado");
    
    document.addEventListener('mousemove', function(e) {
        mx = e.clientX;
        my = e.clientY;
    });
    
    document.addEventListener('mousedown', function() {
        cur.classList.add('ck');
    });
    
    document.addEventListener('mouseup', function() {
        cur.classList.remove('ck');
    });
    
    function loop() {
        cx += (mx - cx) * 0.13;
        cy += (my - cy) * 0.13;
        cur.style.left = cx + 'px';
        cur.style.top = cy + 'px';
        requestAnimationFrame(loop);
    }
    
    loop();
}

// SYNC COM SUPABASE
async function startSync() {
    console.log("[SYNC] Iniciando...");
    setInterval(async () => {
        if (!sessionId) return;
        try {
            const { data, error } = await client
                .from('n3sk')
                .select('state, is_active')
                .eq('id', sessionId)
                .single();
            
            if (error) {
                console.error("[SYNC] Erro:", error);
                return;
            }
            
            if (!data || !data.is_active) {
                console.log("[SYNC] Sessão inativa");
                location.reload();
                return;
            }
            
            if (data.state) {
                applyState(data.state);
            }
        } catch (e) {
            console.error("[SYNC] Exceção:", e);
        }
    }, 500);
}

// ENVIAR ESTADO
async function sendState() {
    if (!sessionId) return;
    const state = {
        toggles: {
            box: document.getElementById('tgl-box').classList.contains('on'),
            skeleton: document.getElementById('tgl-skeleton').classList.contains('on'),
            snapline: document.getElementById('tgl-snapline').classList.contains('on'),
            healthbar: document.getElementById('tgl-healthbar').classList.contains('on')
        },
        colors: {
            boxcolor: "#ff0000",
            skeletoncolor: "#ffffff",
            snaplinecolor: "#00ff00",
            healthbarcolor: "#00ff00"
        },
        alphas: { boxalpha: 1, skeletonalpha: 1, snaplinealpha: 1, healthbaralpha: 1 }
    };
    
    try {
        await client.from('n3sk').update({ state: state }).eq('id', sessionId);
    } catch (e) {
        console.error("[SEND] Erro:", e);
    }
}

function tg(el) {
    el.classList.toggle('on');
    sendState();
}

function setConn(c) {
    document.getElementById('dot').classList.toggle('on', c);
    document.getElementById('txt').classList.toggle('on', c);
    document.getElementById('txt').textContent = c ? 'CONECTADO' : 'OFFLINE';
}

function applyState(s) {
    console.log("[STATE]", s);
    setConn(true);
}

function showQR() {
    client.from('n3sk').select('token').eq('id', sessionId).eq('is_global', true).single()
    .then(({ data, error }) => {
        if (data && data.token) {
            const globalLink = `https://n3sk.xyz/?token=${data.token}`;
            document.getElementById('qr-modal').classList.add('active');
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), {
                text: globalLink,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    });
}

function closeQR() {
    document.getElementById('qr-modal').classList.remove('active');
}
</script>
</body>
</html>
