<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>n3sk Remote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
#waiting{text-align:center}
.loader{width:40px;height:40px;border:3px solid #333;border-top-color:#c73030;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:none;width:100%;height:100%;padding:20px}
input{background:#111;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:4px;width:200px;text-align:center;font-size:14px;margin-top:10px}
button{background:#c73030;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;margin-left:8px}
</style>
</head>
<body>

<div id="waiting">
    <div class="loader"></div>
    <p id="status">Aguardando Loader...</p>
    <p style="font-size:11px;color:#666;margin-top:8px" id="sub">Cole o token gerado pelo C# abaixo:</p>
    <div style="margin-top:12px">
        <input type="text" id="tokenInput" placeholder="Cole o token aqui..." maxlength="20">
        <button onclick="linkToken()">VINCULAR</button>
    </div>
</div>

<div id="app">
    <h2>CONECTADO</h2>
    <p>Token: <span id="displayToken"></span></p>
    <p style="margin-top:20px;color:#666">Interface completa aqui...</p>
</div>

<script>
const SUPA = 'https://gkzxuerurfedfwuxhimf.supabase.co';
const KEY = 'sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6';
const TBL = 'n3sk';

// Gera DeviceID único baseado no navegador
function getDeviceId() {
    const raw = navigator.userAgent + screen.width + screen.height + navigator.language + new Date().getTimezoneOffset();
    let h = 0;
    for (let i = 0; i < raw.length; i++) { h = ((h << 5) - h) + raw.charCodeAt(i); h |= 0; }
    return 'DEV-' + Math.abs(h).toString(16).toUpperCase();
}

const DEVICE_ID = getDeviceId();
let LINKED_TOKEN = localStorage.getItem('n3sk_linked_token');
let SESSION_DATA = null;
let CONNECTED = false;

async function checkSession(token) {
    const res = await fetch(`${SUPA}/rest/v1/${TBL}?id=eq.${token}&select=id,token,device_id,state,is_active`, {
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    const data = await res.json();
    return data.length > 0 ? data[0] : null;
}

async function bindDevice(token) {
    await fetch(`${SUPA}/rest/v1/${TBL}`, {
        method: 'POST',
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ id: token, device_id: DEVICE_ID })
    });
}

function connect(session) {
    if (!CONNECTED) {
        CONNECTED = true;
        localStorage.setItem('n3sk_linked_token', session.id);
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('displayToken').textContent = session.id;
    }
    SESSION_DATA = session.state;
}

async function init() {
    if (LINKED_TOKEN) {
        document.getElementById('status').textContent = 'Verificando sessão...';
        const session = await checkSession(LINKED_TOKEN);
        
        if (session && session.is_active) {
            // Verifica se device_id bate ou está vazio (primeira vez)
            if (!session.device_id || session.device_id === DEVICE_ID) {
                if (!session.device_id) await bindDevice(LINKED_TOKEN);
                connect(session);
                setInterval(poll, 500);
                return;
            } else {
                // Token pertence a outro dispositivo
                localStorage.removeItem('n3sk_linked_token');
                LINKED_TOKEN = null;
                document.getElementById('status').textContent = 'Token inválido para este dispositivo.';
                document.getElementById('sub').textContent = 'Este token está vinculado a outro PC.';
            }
        } else {
            localStorage.removeItem('n3sk_linked_token');
            LINKED_TOKEN = null;
            document.getElementById('status').textContent = 'Loader fechado. Cole o novo token.';
        }
    } else {
        document.getElementById('status').textContent = 'Aguardando Loader...';
    }
    setTimeout(init, 2000);
}

async function poll() {
    if (!LINKED_TOKEN) return;
    const session = await checkSession(LINKED_TOKEN);
    if (!session || !session.is_active) {
        CONNECTED = false;
        localStorage.removeItem('n3sk_linked_token');
        LINKED_TOKEN = null;
        document.getElementById('app').style.display = 'none';
        document.getElementById('waiting').style.display = 'block';
        document.getElementById('status').textContent = 'PC Offline. Cole o novo token.';
        return;
    }
    connect(session);
}

async function linkToken() {
    const token = document.getElementById('tokenInput').value.trim().toUpperCase();
    if (!token) return;
    
    const session = await checkSession(token);
    if (session && session.is_active) {
        if (session.device_id && session.device_id !== DEVICE_ID) {
            alert('Este token já está vinculado a outro dispositivo!');
            return;
        }
        localStorage.setItem('n3sk_linked_token', token);
        LINKED_TOKEN = token;
        await bindDevice(token);
        connect(session);
        setInterval(poll, 500);
    } else {
        alert('Token inválido ou Loader não está rodando.');
    }
}

init();
</script>
</body>
</html>
