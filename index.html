<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>

    <style>
        :root{--red:#c73030;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#8b2e2e;--text:#e0e0e0;--muted:#888}

        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
        
        /* CURSOR - agora aparece em todo lugar */
        body{cursor:none}
        *{cursor:none !important}
        #cur{display:block;position:fixed;width:18px;height:18px;border:2px solid rgba(199,48,48,0.9);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform 0.08s ease}
        #cur.ck{transform:translate(-50%,-50%) scale(0.65)}
        
        /* LOGIN SCREEN - MODERNA */
        #login-screen{
            position:fixed;inset:0;z-index:99999;
            display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#0a0a0a 0%,#1a0505 50%,#0a0a0a 100%);
            font-family:'Segoe UI',sans-serif;color:white;
            animation:bgShift 15s ease infinite;
        }
        @keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        
        .login-card{
            background:rgba(15,15,15,0.95);backdrop-filter:blur(20px);
            padding:60px 50px;border-radius:20px;
            border:1.5px solid rgba(199,48,48,0.3);

        }
        @keyframes floatIn{
            0%{opacity:0;transform:translateY(50px) scale(0.9)}
            100%{opacity:1;transform:translateY(0) scale(1)}
        }
        
        .login-card h1{
            font-size:48px;margin:0 0 10px;letter-spacing:4px;text-transform:uppercase;font-weight:900;
            background:linear-gradient(135deg,#ff6b6b,var(--red),#ff4444);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            text-shadow:0 0 30px rgba(199,48,48,0.3);
        }
        
        .login-status{
            display:flex;align-items:center;justify-content:center;gap:8px;margin:30px 0 20px;
        }
        
        .status-dot{
            width:8px;height:8px;border-radius:50%;background:#444;animation:pulse-status 1.5s ease-in-out infinite;
        }
        .status-dot.checking{background:#ffa500;box-shadow:0 0 10px #ffa500}
        
        @keyframes pulse-status{
            0%,100%{opacity:0.5;transform:scale(1)}
            50%{opacity:1;transform:scale(1.2)}
        }
        
        .login-card p{color:#aaa;font-size:14px;margin-bottom:15px;letter-spacing:0.5px}
        
        .loader{
            width:40px;height:40px;margin:0 auto 15px;
            border:3px solid #2a2a2a;
            border-top-color:var(--red);
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        
        #app{display:none;height:100%}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,0.7)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
        
        .wrap{display:flex;height:100%;gap:12px;padding:12px;animation:fadeIn 0.5s ease}
        .sidebar{width:240px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px}
        .profile-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
        .profile-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--red);box-shadow:0 0 10px rgba(199,48,48,0.3);background:var(--bg3)}
        .profile-info{display:flex;flex-direction:column;gap:2px}
        .profile-name{font-size:14px;font-weight:700;color:#fff}

        .btn-qr{width:100%;padding:12px;background:transparent;border:1.5px solid var(--red);color:var(--red);font-weight:700;border-radius:8px;cursor:pointer;margin-top:10px;transition:all 0.3s}

        }

        .qr-close{background:var(--red);color:#fff;border:none;padding:12px 35px;border-radius:8px;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.3s}
        .qr-close:hover{background:#ff6b6b;box-shadow:0 0 15px rgba(199,48,48,0.4);transform:translateY(-2px)}
        
        /* COLOR PICKER */
        .cp-ol{display:none;position:fixed;inset:0;z-index:9000}
        .cp-ol.open{display:block}
        .cp-box{position:fixed;background:#161616;border:1.5px solid var(--border);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start;z-index:901;box-shadow:0 16px 48px rgba(0,0,0,0.9)}
        .sv{width:190px;height:152px;border-radius:5px;position:relative;overflow:hidden;border:1px solid #222;cursor:crosshair}
        .sv-w{position:absolute;inset:0;background:linear-gradient(to right,#fff,transparent)}
        .sv-b{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000)}
        .sv-th{position:absolute;width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 1.5px rgba(0,0,0,0.7)}

        .bck{width:100%;height:100%;background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/8px 8px}

        .bth{position:absolute;left:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-radius:50%;background:#fff;border:2.5px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,0.6);pointer-events:none;z-index:10}
    </style>

<script>
// ============================================
// CURSOR GLOBAL
// ============================================
(function(){
    const cur = document.getElementById('cur');
    let mx = window.innerWidth/2, my = window.innerHeight/2;
    let cx = mx, cy = my;
    
    document.addEventListener('mousemove', e => { 
        mx = e.clientX; 
        my = e.clientY; 
    }, {passive:true});
    
    document.addEventListener('mousedown', () => cur.classList.add('ck'));
    document.addEventListener('mouseup', () => cur.classList.remove('ck'));
    
    function loop(){
        cx += (mx-cx)*0.15;
        cy += (my-cy)*0.15;
        cur.style.left = cx+'px';
        cur.style.top = cy+'px';
        requestAnimationFrame(loop);
    }
    loop();
})();

// ============================================
// SUPABASE
// ============================================
const SUPA_URL = "https://gkzxuerurfedfwuxhimf.supabase.co";
const SUPA_KEY = "sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6";
const client = supabase.createClient(SUPA_URL, SUPA_KEY);

let sessionId = null;
let mainToken = null;
let globalSessionId = null;
let globalToken = null;
let syncInterval = null;

// ============================================
// INICIALIZAÇÃO
// ============================================
window.onload = async function(){
    const token = new URLSearchParams(window.location.search).get('token');
    console.log("[INIT] Token:", token);
    
    if(!token){
        document.getElementById('login-msg').textContent = "Token não encontrado";
        document.querySelector('.status-dot').style.background = '#ff4444';
        return;
    }
    
    try{
        // Buscar sessão (main ou global)
        const {data, error} = await client.from('n3sk').select('*').eq('token', token).eq('is_active', true).single();
        console.log("[INIT] Dados:", data, "Erro:", error);
        
        if(error || !data){
            document.getElementById('login-msg').textContent = "Token inválido";
            document.querySelector('.status-dot').style.background = '#ff4444';
            return;
        }
        
        sessionId = data.id;
        mainToken = data.token;
        
        // Se é uma sessão global, buscar a main correspondente
        if(data.is_global){
            const mainId = data.id.replace('_GLOBAL', '');
            const {data: mainData} = await client.from('n3sk').select('*').eq('id', mainId).eq('is_global', false).single();
            if(mainData){
                globalSessionId = data.id;
                globalToken = data.token;
                sessionId = mainId;
            } else {
                document.getElementById('login-msg').textContent = "Sessão main não encontrada";
                return;
            }
        } else {
            // É uma main, buscar a global correspondente
            globalSessionId = `${data.id}_GLOBAL`;
            const {data: globalData} = await client.from('n3sk').select('token').eq('id', globalSessionId).eq('is_global', true).single();
            if(globalData){
                globalToken = globalData.token;
            }
        }
        
        // Validação de IP para main sessions
        if(!data.is_global && data.ip && data.ip !== "UNKNOWN"){
            try{
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                if(ipData.ip !== data.ip){
                    document.getElementById('login-msg').textContent = "Acesso negado - IP diferente";
                    document.querySelector('.status-dot').style.background = '#ff4444';
                    return;
                }
            }catch(e){}
        }
        
        // Marcar como a origem desta sessão
        localStorage.setItem('n3sk_session_owner', sessionId);
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        setConn(true);
        startSync();
        resizeCanvas();
        scheduleRender();
        console.log("[INIT] App iniciado!");
    }catch(e){
        console.error("[INIT] Erro:", e);
        document.getElementById('login-msg').textContent = "Erro: "+e.message;
        document.querySelector('.status-dot').style.background = '#ff4444';
    }
};

// ============================================
// TOGGLES - CORRIGIDO
// ============================================
function toggleSwitch(el, key){
    el.classList.toggle('on');
    scheduleRender();
    sendState();
}

// ============================================
// COLOR PICKER - REAL-TIME UPDATE
// ============================================
let cpTarget = null;
let cpH = 0, cpS = 1, cpV = 1, cpA = 1;
let svTX = 1, svTY = 0, svCX = 1, svCY = 0;
let hTY = 0, hCY = 0, aCY = 0;
let dSV = false, dH = false, dA = false;

const cpOl = document.getElementById('cpOl');
const cpBox = document.getElementById('cpBox');
const svEl = document.getElementById('sv');
const svTh = document.getElementById('svTh');
const hueTr = document.getElementById('hueTr');
const hueTh = document.getElementById('hueTh');
const aTr = document.getElementById('aTr');
const aGr = document.getElementById('aGr');
const aTh = document.getElementById('aTh');

function openColorPicker(el, defaultColor){
    cpTarget = el;
    const rect = el.getBoundingClientRect();
    cpBox.style.left = Math.min(rect.right + 10, window.innerWidth - 250) + 'px';
    cpBox.style.top = Math.min(rect.top, window.innerHeight - 200) + 'px';
    
    let hex = el.getAttribute('data-hex') || defaultColor;
    if(!hex.startsWith('#')){
        hex = rgbToHex(el.style.backgroundColor || defaultColor);
    }
    
    const hsv = hexToHsv(hex);
    cpH = hsv[0]; cpS = hsv[1]; cpV = hsv[2]; cpA = 1;
    
    svCX = cpS; svTX = cpS;
    svCY = 1 - cpV; svTY = 1 - cpV;
    hCY = cpH; hTY = cpH;
    aCY = 1 - cpA;
    
    updateCP();
    updateHandles();
    cpOl.classList.add('open');
}

function rgbToHex(rgb){
    if(rgb.startsWith('#')) return rgb;
    const values = rgb.match(/\d+/g);
    if(!values || values.length < 3) return '#ff0000';
    return '#' + values.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

function hexToHsv(hex){
    hex = hex.replace('#','');
    const r = parseInt(hex.substring(0,2),16)/255;
    const g = parseInt(hex.substring(2,4),16)/255;
    const b = parseInt(hex.substring(4,6),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    const d = max - min;
    let h = 0;
    if(d !== 0){
        switch(max){
            case r: h = ((g-b)/d)%6; break;
            case g: h = (b-r)/d + 2; break;
            case b: h = (r-g)/d + 4; break;
        }
    }
    h = h < 0 ? h + 6 : h;
    return [h/6, max === 0 ? 0 : d/max, max];
}

function hsvToRgb(h,s,v){
    let r,g,b;
    const i = Math.floor(h*6);
    const f = h*6 - i;
    const p = v*(1-s);
    const q = v*(1-f*s);
    const t = v*(1-(1-f)*s);
    switch(i%6){
        case 0: r=v; g=t; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

function rgbToHex2(r,g,b){
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function updateCP(){
    const rgb = hsvToRgb(cpH, cpS, cpV);
    const hex = rgbToHex2(rgb[0], rgb[1], rgb[2]);
    const hRgb = hsvToRgb(cpH, 1, 1);
    const hHex = rgbToHex2(hRgb[0], hRgb[1], hRgb[2]);
    
    svEl.style.background = hHex;
    svTh.style.background = hex;
    aGr.style.background = `linear-gradient(to bottom,${hHex},transparent)`;
    hueTh.style.background = hHex;
    aTh.style.background = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${cpA})`;
    
    if(cpTarget){
        cpTarget.style.background = hex;
        cpTarget.setAttribute('data-hex', hex);
        scheduleRender();
        // Enviar estado imediatamente enquanto arrasta
        sendState();
    }
}

function updateHandles(){
    const svRect = svEl.getBoundingClientRect();
    svTh.style.left = (svCX * svRect.width) + 'px';
    svTh.style.top = (svCY * svRect.height) + 'px';
    
    const hueRect = hueTr.getBoundingClientRect();
    hueTh.style.top = (hCY * hueRect.height) + 'px';
    
    const aRect = aTr.getBoundingClientRect();
    aTh.style.top = (aCY * aRect.height) + 'px';
}

function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

cpOl.addEventListener('mousedown', e => {
    if(e.target === cpOl){
        cpOl.classList.remove('open');
    }
});

svEl.addEventListener('mousedown', e => { e.preventDefault(); dSV = true; doSV(e); });
hueTr.addEventListener('mousedown', e => { e.preventDefault(); dH = true; doH(e); });
aTr.addEventListener('mousedown', e => { e.preventDefault(); dA = true; doA(e); });

document.addEventListener('mousemove', e => {
    if(dSV) doSV(e);
    if(dH) doH(e);
    if(dA) doA(e);
});

document.addEventListener('mouseup', () => {
    dSV = false; dH = false; dA = false;
});

function doSV(e){
    const r = svEl.getBoundingClientRect();
    cpS = clamp((e.clientX - r.left)/r.width, 0, 1);
    cpV = clamp(1 - (e.clientY - r.top)/r.height, 0, 1);
    svCX = cpS; svTX = cpS;
    svCY = 1 - cpV; svTY = 1 - cpV;
    updateCP();
    updateHandles();
}

function doH(e){
    const r = hueTr.getBoundingClientRect();
    cpH = clamp((e.clientY - r.top)/r.height, 0, 0.9999);
    hCY = cpH; hTY = cpH;
    updateCP();
    updateHandles();
}

function doA(e){
    const r = aTr.getBoundingClientRect();
    const height = r.height || 152;
    cpA = clamp(1 - (e.clientY - r.top)/height, 0, 1);
    aCY = 1 - cpA;
    updateCP();
    updateHandles();
}

// ============================================
// SYNC E ESTADO
// ============================================
async function startSync(){
    // Sync a cada 100ms
    syncInterval = setInterval(async () => {
        if(!sessionId) return;
        const {data, error} = await client.from('n3sk').select('state, is_active').eq('id', sessionId).single();
        if(error || !data || !data.is_active){ 
            deleteSession();
            location.reload(); 
            return; 
        }
        if(data.state) applyState(data.state);
    }, 100);
    
    // Cleanup ao fechar
    window.addEventListener('beforeunload', deleteSession);
}

async function sendState(){
    if(!sessionId) return;
    
    const state = {
        toggles: {
            box: document.getElementById('tgl-box').classList.contains('on'),
            skeleton: document.getElementById('tgl-skeleton').classList.contains('on'),
            snapline: document.getElementById('tgl-snapline').classList.contains('on'),
            healthbar: document.getElementById('tgl-healthbar').classList.contains('on')
        },
        colors: {
            boxcolor: document.getElementById('sw-boxcolor').getAttribute('data-hex') || '#ff0000',
            skeletoncolor: document.getElementById('sw-skeletoncolor').getAttribute('data-hex') || '#ffffff',
            snaplinecolor: document.getElementById('sw-snaplinecolor').getAttribute('data-hex') || '#00ff00',
            healthbarcolor: document.getElementById('sw-healthbarcolor').getAttribute('data-hex') || '#00ff00'
        },
        alphas: { boxalpha: cpA, skeletonalpha: 1, snaplinealpha: 1, healthbaralpha: 1 }
    };
    
    await client.from('n3sk').update({state}).eq('id', sessionId).select();
}

function applyState(s){
    setConn(true);
    const toggles = {box:'tgl-box', skeleton:'tgl-skeleton', snapline:'tgl-snapline', healthbar:'tgl-healthbar'};
    for(let k in toggles){
        const el = document.getElementById(toggles[k]);
        if(el && s.toggles) el.classList.toggle('on', !!s.toggles[k]);
    }
    
    if(s.colors){
        const colorMap = {
            boxcolor: 'sw-boxcolor',
            skeletoncolor: 'sw-skeletoncolor',
            snaplinecolor: 'sw-snaplinecolor',
            healthbarcolor: 'sw-healthbarcolor'
        };
        for(let key in colorMap){
            if(s.colors[key]){
                const el = document.getElementById(colorMap[key]);
                if(el){
                    el.style.background = s.colors[key];
                    el.setAttribute('data-hex', s.colors[key]);
                }
            }
        }
    }
}

function setConn(c){
    document.getElementById('dot').classList.toggle('on', c);
    document.getElementById('txt').classList.toggle('on', c);
    document.getElementById('txt').textContent = c ? 'CONECTADO' : 'OFFLINE';
}

// ============================================
// DELETE SESSION - APENAS SUAS PRÓPRIAS SESSÕES
// ============================================
async function deleteSession(){
    if(!sessionId) return;
    
    const owner = localStorage.getItem('n3sk_session_owner');
    // Só deleta se esta foi a sessão que criou
    if(owner !== sessionId) return;
    
    try{
        // Deletar main session
        await client.from('n3sk').delete().eq('id', sessionId);
        
        // Deletar global session
        if(globalSessionId){
            await client.from('n3sk').delete().eq('id', globalSessionId);
        }
        
        localStorage.removeItem('n3sk_session_owner');
        console.log("[DELETE] Sessões deletadas");
    }catch(e){
        console.error("[DELETE] Erro:", e);
    }
}

// ============================================
// QR CODE
// ============================================
function showQR(){
    if(!globalToken){
        alert("Token global não disponível");
        return;
    }
    
    const globalLink = `https://n3sk.xyz/?token=${globalToken}`;
    document.getElementById('qr-modal').classList.add('active');
    document.getElementById('qrcode').innerHTML = '';
    
    setTimeout(() => {
        new QRCode(document.getElementById("qrcode"), {
            text: globalLink,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }, 50);
    
    console.log("[QR] Link:", globalLink);
}

function closeQR(){
    document.getElementById('qr-modal').classList.remove('active');
}

// ============================================
// PREVIEW CANVAS
// ============================================
const PREVIEW_IMG = 'https://media.discordapp.net/attachments/1184323047931531294/1519504042357817424/Screenshot_111.png';
const canvas = document.getElementById('cvs');
const ctx = canvas.getContext('2d', {alpha:false});
let canvasWidth = 0, canvasHeight = 0, renderScheduled = false, bgImage = null;
let hpAnimTime = 0, boxOpacity = 0, targetBoxOpacity = 0;

bgImage = new Image();
bgImage.crossOrigin = "Anonymous";
bgImage.src = PREVIEW_IMG;
bgImage.onload = () => scheduleRender();

function resizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();
    const nw = rect.width, nh = rect.height - 35;
    const dpr = window.devicePixelRatio || 1;
    if(canvasWidth !== nw || canvasHeight !== nh){
        canvas.width = nw * dpr;
        canvas.height = nh * dpr;
        canvas.style.width = nw + 'px';
        canvas.style.height = nh + 'px';
        ctx.scale(dpr, dpr);
        canvasWidth = nw;
        canvasHeight = nh;
        scheduleRender();
    }
}

function scheduleRender(){
    if(!renderScheduled){
        renderScheduled = true;
        requestAnimationFrame(renderPreview);
    }
}

function renderPreview(){
    renderScheduled = false;
    if(!canvasWidth || !canvasHeight) return;
    
    ctx.save();
    ctx.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    if(bgImage && bgImage.complete && bgImage.naturalWidth > 0){
        const s = Math.min(canvasWidth/bgImage.width, canvasHeight/bgImage.height);
        const w = bgImage.width * s, h = bgImage.height * s;
        ctx.drawImage(bgImage, (canvasWidth-w)/2, (canvasHeight-h)/2, w, h);
    }
    
    const isBox = document.getElementById('tgl-box').classList.contains('on');
    const isHp = document.getElementById('tgl-healthbar').classList.contains('on');
    
    const bH = canvasHeight * 0.75;
    const bW = bH * 0.45;
    const bX = (canvasWidth - bW) / 2;
    const bY = (canvasHeight - bH) / 2 + 20;
    
    targetBoxOpacity = isBox ? 1 : 0;
    boxOpacity = boxOpacity + (targetBoxOpacity - boxOpacity) * 0.1;
    
    if(boxOpacity > 0.01){
        ctx.globalAlpha = boxOpacity;
        ctx.strokeStyle = document.getElementById('sw-boxcolor').getAttribute('data-hex') || '#ff0000';
        ctx.lineWidth = 2;
        const l = bW * 0.25;
        ctx.beginPath();
        ctx.moveTo(bX, bY+l); ctx.lineTo(bX, bY); ctx.lineTo(bX+l, bY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bX+bW-l, bY); ctx.lineTo(bX+bW, bY); ctx.lineTo(bX+bW, bY+l);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bX, bY+bH-l); ctx.lineTo(bX, bY+bH); ctx.lineTo(bX+l, bY+bH);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bX+bW-l, bY+bH); ctx.lineTo(bX+bW, bY+bH); ctx.lineTo(bX+bW, bY+bH-l);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }
    
    if(isHp){
        const bw = 6, bx = bX - 12;
        hpAnimTime += 0.05;
        const pulse = 0.5 + 0.5 * Math.sin(hpAnimTime * 2 * Math.PI * 0.3);
        const hpH = bH * pulse;
        ctx.fillStyle = 'rgba(15,15,15,0.8)';
        ctx.fillRect(bx, bY, bw, bH);
        ctx.fillStyle = document.getElementById('sw-healthbarcolor').getAttribute('data-hex') || '#00ff00';
        ctx.fillRect(bx, bY + (bH - hpH), bw, hpH);
    }
    
    ctx.restore();
    if(Math.abs(boxOpacity - targetBoxOpacity) > 0.01 || isHp) scheduleRender();
}

// Resize ao iniciar app
window.addEventListener('resize', resizeCanvas);
</script>
