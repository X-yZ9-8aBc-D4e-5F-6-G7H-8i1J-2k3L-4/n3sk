<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>n3sk Remote</title>
<style>
:root{ --red:#c73030; --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a; --border:#8b2e2e; --text:#e0e0e0; --muted:#888; color-scheme: light dark; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;cursor:none}
@media(hover:hover){body{cursor:none}#cur{position:fixed;width:18px;height:18px;border:2px solid rgba(199,48,48,.9);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}#cur.ck{transform:translate(-50%,-50%) scale(.65);border-color:#ff6b6b}}
@media(hover:none),(max-width:900px){*{cursor:auto!important}#cur{display:none!important}}
#waiting-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .5s}
.loader-ring{width:48px;height:48px;border:4px solid #333;border-top:4px solid var(--red);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-text{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.wait-sub{font-size:11px;color:#666;max-width:80%;text-align:center;line-height:1.4}
#app{display:none;height:100%}
.wrap{display:flex;height:100%;gap:12px;padding:12px;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px}
.profile-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.profile-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--red)}
.profile-info{display:flex;flex-direction:column;gap:2px}
.profile-name{font-size:14px;font-weight:700;color:#fff}
.profile-sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
.logo{text-align:center;padding:10px 0 16px;border-bottom:1.5px solid var(--border)}
.stat-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:var(--bg3);border-radius:6px;border:1.5px solid #333}
.stat-dot{width:10px;height:10px;border-radius:50%;background:#444;transition:.3s}
.stat-dot.on{background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.7)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.stat-txt{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;transition:.3s}
.stat-txt.on{color:#4ade80}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.ph{background:var(--border);padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:2px;color:#fff}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #1c1c1c}
.row:last-child{border-bottom:none}.row span{font-size:12px}
.preview-panel{width:420px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
.preview-canvas{flex:1;background:#050505;width:100%;height:100%;display:block}
.tgl{width:46px;height:26px;background:#2a2a2a;border-radius:99px;position:relative;border:1.5px solid #444;transition:.2s;user-select:none;flex-shrink:0}
.tgl.on{background:var(--red);border-color:#ff6b6b;box-shadow:0 0 8px rgba(199,48,48,.4)}
.tgl::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.tgl.on::after{left:22px}
.sw-container{width:36px;height:24px;flex-shrink:0;border-radius:4px;overflow:hidden;border:1.5px solid #555;cursor:pointer}
.sw-svg{width:100%;height:100%;display:block}
.cp-ol{display:none;position:fixed;inset:0;z-index:9000}.cp-ol.open{display:block}
.cp-box{position:fixed;background:#161616;border:1.5px solid var(--border);border-radius:10px;padding:12px;display:flex;gap:10px;z-index:901;box-shadow:0 16px 48px rgba(0,0,0,.9)}
.sv{width:190px;height:152px;border-radius:5px;position:relative;overflow:hidden;border:1px solid #222}
.sv-w{position:absolute;inset:0;background:linear-gradient(to right,#fff,transparent)}
.sv-b{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000)}
.sv-th{position:absolute;width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;transform:translate(-50%,-50%);pointer-events:none}
.bars{display:flex;gap:8px}
.btr{position:relative;width:14px;height:152px;border-radius:99px;overflow:visible;border:1px solid #222}
.bin{position:absolute;inset:0;border-radius:99px;overflow:hidden}
.bh{width:100%;height:100%;background:linear-gradient(to bottom,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%)}
.bck{width:100%;height:100%;background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/8px 8px}
.bag{position:absolute;inset:0;border-radius:99px;pointer-events:none}
.bth{position:absolute;left:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-radius:50%;background:#fff;border:2.5px solid #fff;pointer-events:none;z-index:10}
.qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10001;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.qr-modal.active{display:flex}
.qr-content{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:24px;text-align:center;width:320px}
.qr-content h3{margin-bottom:16px;font-size:14px;letter-spacing:1px}
.qr-content img{width:200px;height:200px;border-radius:8px;border:1px solid #333;margin-bottom:16px}
.qr-close{background:var(--border);color:white;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:1px}
@media(max-width:900px){.wrap{flex-direction:column;height:auto;overflow-y:auto}.sidebar{width:100%;flex-direction:row;flex-wrap:wrap}.profile-card{flex:1 1 100%}.logo{flex:1 1 100%}.stat-box{flex:1}.main{width:100%}.preview-panel{width:100%;height:60vh}}
</style>
</head>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

<script>
const SUPA = 'https://gkzxuerurfedfwuxhimf.supabase.co';
const KEY = 'sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6';
const TBL = 'n3sk';

// Lê parâmetros da URL
const urlParams = new URLSearchParams(window.location.search);
const URL_ID = urlParams.get('id');
const URL_TOKEN = urlParams.get('token');
const URL_HWID = urlParams.get('hwid');

// Recupera dados salvos localmente
let LINKED_TOKEN = localStorage.getItem('n3sk_linked_token');
let SAVED_HWID = localStorage.getItem('n3sk_hwid');
let SESSION_TOKEN = '';
let currentState = null;
let CONNECTED = false;

const statusEl = document.getElementById('status-msg');
const detailEl = document.getElementById('status-detail');
function updateStatus(msg, sub='') { 
    if(statusEl) statusEl.innerText = msg; 
    if(detailEl) detailEl.innerText = sub; 
}

async function fetchSpecificSession(token) {
    const res = await fetch(`${SUPA}/rest/v1/${TBL}?id=eq.${token}&select=id,token,hwid,state,is_active`, {
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    const data = await res.json();
    return data.length > 0 ? data[0] : null;
}

async function updateState(newState) {
    if (!LINKED_TOKEN) return;
    await fetch(`${SUPA}/rest/v1/${TBL}`, {
        method: 'POST',
        headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ id: LINKED_TOKEN, token: SESSION_TOKEN, state: newState })
    });
}

function connect(session) {
    if (!CONNECTED) {
        CONNECTED = true;
        SESSION_TOKEN = session.token;
        // Salva Token e HWID recebidos do Loader
        localStorage.setItem('n3sk_linked_token', session.id);
        localStorage.setItem('n3sk_hwid', session.hwid);
        
        updateStatus("CONECTADO", `HWID Validado: ${session.hwid?.substring(0,8)}...`);
        document.getElementById('waiting-screen').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('waiting-screen').style.display = 'none'; 
            document.getElementById('app').style.display = 'block'; 
        }, 300);
    }
    document.getElementById('dot').classList.add('on');
    document.getElementById('txt').classList.add('on');
    document.getElementById('txt').textContent = 'CONECTADO';
    currentState = session.state || {};
    applyUIToState(currentState);
}

function applyUIToState(d) {
    if(!d) return;
    var tm={box:'tgl-box',skeleton:'tgl-skeleton',snapline:'tgl-snapline',healthbar:'tgl-healthbar'};
    for(var k in tm){var el=document.getElementById(tm[k]);if(el)el.classList.toggle('on',!!d.toggles?.[k])}
    var cm={boxcolor:'sw-boxcolor',skeletoncolor:'sw-skeletoncolor',snaplinecolor:'sw-snaplinecolor',healthbarcolor:'sw-healthbarcolor'};
    for(var k in cm){var el=document.getElementById(cm[k]);if(el&&d.colors?.[k]){var rect=el.querySelector('rect');if(rect)rect.setAttribute('fill',d.colors[k])}}
    scheduleRender();
}

async function init() {
    // PRIORIDADE 1: Primeira conexão via Link do Console (Contém HWID Real)
    if (URL_ID && URL_TOKEN && URL_HWID) {
        updateStatus("Vinculando HWID...", URL_HWID);
        const session = await fetchSpecificSession(URL_ID);
        if (session && session.is_active && session.hwid === URL_HWID) {
            // HWID bate! Salva e conecta
            LINKED_TOKEN = URL_ID;
            SESSION_TOKEN = URL_TOKEN;
            SAVED_HWID = URL_HWID;
            connect(session);
            startPolling(URL_ID);
            // Limpa URL para segurança
            window.history.replaceState({}, document.title, window.location.pathname);
            return;
        } else {
            updateStatus("ERRO DE VINCULAÇÃO", "HWID ou Token inválidos.");
            return;
        }
    }

    // PRIORIDADE 2: Conexões subsequentes (Usa HWID salvo no LocalStorage)
    if (LINKED_TOKEN && SAVED_HWID) {
        updateStatus("Verificando sessão...", `HWID: ${SAVED_HWID.substring(0,8)}...`);
        const session = await fetchSpecificSession(LINKED_TOKEN);
        
        if (session && session.is_active) {
            // Validação RÍGIDA: HWID salvo deve bater com HWID da sessão no banco
            if (session.hwid === SAVED_HWID) {
                SESSION_TOKEN = session.token;
                connect(session);
                startPolling(LINKED_TOKEN);
                return;
            } else {
                // HWID mudou ou sessão pertence a outro PC
                localStorage.removeItem('n3sk_linked_token');
                localStorage.removeItem('n3sk_hwid');
                LINKED_TOKEN = null;
                SAVED_HWID = null;
                updateStatus("ACESSO NEGADO", `HWID do Loader: ${session.hwid?.substring(0,8)}... ≠ Seu HWID Salvo`);
            }
        } else {
            // Sessão deletada
            localStorage.removeItem('n3sk_linked_token');
            localStorage.removeItem('n3sk_hwid');
            LINKED_TOKEN = null;
            SAVED_HWID = null;
            updateStatus("LOADER FECHADO", "Reinicie o C# e use o novo link.");
        }
    } else {
        // Sem vínculo estabelecido
        updateStatus("AGUARDANDO VINCULAÇÃO", "Copie o link do console do C# e cole aqui.");
    }
    
    setTimeout(init, 2000);
}

async function startPolling(token) {
    setInterval(async () => {
        const session = await fetchSpecificSession(token);
        if (!session || !session.is_active) {
            CONNECTED = false;
            localStorage.removeItem('n3sk_linked_token');
            localStorage.removeItem('n3sk_hwid');
            LINKED_TOKEN = null;
            document.getElementById('app').style.display = 'none';
            document.getElementById('waiting-screen').style.display = 'flex';
            document.getElementById('waiting-screen').style.opacity = '1';
            document.getElementById('dot').classList.remove('on');
            document.getElementById('txt').classList.remove('on');
            document.getElementById('txt').textContent = 'OFFLINE';
            updateStatus("PC OFFLINE", "Loader fechado.");
            setTimeout(init, 3000);
            return;
        }
        if(session.state) { currentState = session.state; applyUIToState(currentState); }
    }, 100);
}

function tg(el){
    if(!currentState) return;
    el.classList.toggle('on');
    currentState.toggles[el.dataset.k] = el.classList.contains('on');
    updateState(currentState);
    scheduleRender();
}

function openQR(){
    if(!LINKED_TOKEN || !SESSION_TOKEN){ alert("Conecte-se ao Loader primeiro!"); return; }
    // QR Code ignora HWID (acesso universal para secundários)
    const url = `${window.location.origin}${window.location.pathname}?id=${LINKED_TOKEN}&token=${SESSION_TOKEN}`;
    document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
    document.getElementById('qrModal').classList.add('active');
}
function closeQR(){ document.getElementById('qrModal').classList.remove('active'); }

// Cursor Sem Lag
var cur=document.getElementById('cur'),mx=0,my=0;
document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; if(cur) cur.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`; });
document.addEventListener('mousedown',()=>cur&&cur.classList.add('ck'));
document.addEventListener('mouseup',()=>cur&&cur.classList.remove('ck'));

// Preview Canvas
var canvas=document.getElementById('espCanvas'),ctx=canvas.getContext('2d',{alpha:false}),canvasWidth=0,canvasHeight=0,renderScheduled=false,bgImage=null,hpAnimTime=0,boxOpacity=0,targetBoxOpacity=0;
const PREVIEW_IMG_URL='https://media.discordapp.net/attachments/1184323047931531294/1519504042357817424/Screenshot_111.png?ex=6a3dcbea&is=6a3c7a6a&hm=95ab23192fdc65d73e612fadc773aac107802e9a93602097a289073aabc498b2&=&format=webp&quality=lossless&width=800&height=968';
if(PREVIEW_IMG_URL){bgImage=new Image();bgImage.crossOrigin="Anonymous";bgImage.src=PREVIEW_IMG_URL;bgImage.onload=()=>scheduleRender()}
function resizeCanvas(){var r=canvas.parentElement.getBoundingClientRect(),nw=r.width,nh=r.height-35,dpr=window.devicePixelRatio||1;if(canvasWidth!==nw||canvasHeight!==nh){canvas.width=nw*dpr;canvas.height=nh*dpr;canvas.style.width=nw+'px';canvas.style.height=nh+'px';ctx.scale(dpr,dpr);canvasWidth=nw;canvasHeight=nh;scheduleRender()}}
window.addEventListener('resize',resizeCanvas);
function scheduleRender(){if(!renderScheduled){renderScheduled=true;requestAnimationFrame(renderPreview)}}
function lerp(a,b,t){return a*(1-t)+b*t}
function renderPreview(){
    renderScheduled=false;if(!canvasWidth||!canvasHeight)return;
    ctx.save();ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
    ctx.fillStyle='#050505';ctx.fillRect(0,0,canvasWidth,canvasHeight);
    if(bgImage&&bgImage.complete){var s=Math.min(canvasWidth/bgImage.width,canvasHeight/bgImage.height),w=bgImage.width*s,h=bgImage.height*s;ctx.drawImage(bgImage,(canvasWidth-w)/2,(canvasHeight-h)/2,w,h)}
    var isBox=document.getElementById('tgl-box')?.classList.contains('on'),isHp=document.getElementById('tgl-healthbar')?.classList.contains('on');
    function gc(id){var e=document.getElementById(id),r=e?.querySelector('rect');return r?r.getAttribute('fill'):'#fff'}
    var bC=gc('sw-boxcolor'),hC=gc('sw-healthbarcolor'),bH=canvasHeight*.75,bW=bH*.45,bX=(canvasWidth-bW)/2,bY=(canvasHeight-bH)/2+20;
    targetBoxOpacity=isBox?1:0;boxOpacity=lerp(boxOpacity,targetBoxOpacity,.1);
    if(boxOpacity>.01){ctx.globalAlpha=boxOpacity;ctx.strokeStyle=bC;ctx.lineWidth=2;var l=bW*.25;ctx.beginPath();ctx.moveTo(bX,bY+l);ctx.lineTo(bX,bY);ctx.lineTo(bX+l,bY);ctx.stroke();ctx.beginPath();ctx.moveTo(bX+bW-l,bY);ctx.lineTo(bX+bW,bY);ctx.lineTo(bX+bW,bY+l);ctx.stroke();ctx.beginPath();ctx.moveTo(bX,bY+bH-l);ctx.lineTo(bX,bY+bH);ctx.lineTo(bX+l,bY+bH);ctx.stroke();ctx.beginPath();ctx.moveTo(bX+bW-l,bY+bH);ctx.lineTo(bX+bW,bY+bH);ctx.lineTo(bX+bW,bY+bH-l);ctx.stroke();ctx.globalAlpha=1}
    if(isHp){var bw=6,bx=bX-12;hpAnimTime+=.08;var p=.5+.5*Math.sin(hpAnimTime*2*Math.PI*.4),ch=bH*p;ctx.fillStyle='rgba(15,15,15,.8)';ctx.fillRect(bx,bY,bw,bH);ctx.fillStyle=hC;ctx.fillRect(bx,bY+(bH-ch),bw,ch)}
    ctx.restore();if(Math.abs(boxOpacity-targetBoxOpacity)>.01||isHp)scheduleRender()
}

// Color Picker
var cpTarget=null,cpH=0,cpS=1,cpV=1,cpA=1,svTX=1,svTY=0,svCX=1,svCY=0,hTY=0,hCY=0,aCY=0,animRun=false;
var cpOl=document.getElementById('cpOl'),cpBox=document.getElementById('cpBox'),svEl=document.getElementById('sv'),svTh=document.getElementById('svTh'),hueTr=document.getElementById('hueTr'),hueTh=document.getElementById('hueTh'),aTr=document.getElementById('aTr'),aGr=document.getElementById('aGr'),aTh=document.getElementById('aTh');
function h2r(h,s,v){var r,g,b,i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break}return[Math.round(r*255),Math.round(g*255),Math.round(b*255)]}
function r2h(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function hex2hsv(hex){var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h,s=mx===0?0:d/mx,v=mx;if(d===0)h=0;else if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;return[h/6,s,v]}
function runAnim(){var sp=.35;svCX=lerp(svCX,svTX,sp);svCY=lerp(svCY,svTY,sp);hCY=lerp(hCY,hTY,sp);svTh.style.left=(svCX*100)+'%';svTh.style.top=(svCY*100)+'%';var hH=hueTr.getBoundingClientRect().height||152,aH=aTr.getBoundingClientRect().height||152;hueTh.style.top=(hCY*hH)+'px';aTh.style.top=(aCY*aH)+'px';if(Math.abs(svCX-svTX)>.0005||Math.abs(svCY-svTY)>.0005||Math.abs(hCY-hTY)>.0005)requestAnimationFrame(runAnim);else animRun=false}
function updateCP(){var rgb=h2r(cpH,cpS,cpV),hRgb=h2r(cpH,1,1),hHex=r2h(hRgb[0],hRgb[1],hRgb[2]);svEl.style.background=hHex;svTh.style.background=r2h(rgb[0],rgb[1],rgb[2]);aGr.style.background='linear-gradient(to bottom,'+hHex+',transparent)';hueTh.style.background=hHex;aTh.style.background='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+cpA+')';if(cpTarget){var hex=r2h(rgb[0],rgb[1],rgb[2]);var rect=cpTarget.querySelector('rect');if(rect)rect.setAttribute('fill',hex);scheduleRender()}}
function openCP(el){cpTarget=el;var rect=el.getBoundingClientRect(),popW=240,popH=190,left=rect.right+10,top=rect.top;if(left+popW>innerWidth)left=rect.left-popW-10;if(top+popH>innerHeight)top=innerHeight-popH-10;if(left<4)left=4;if(top<4)top=4;cpBox.style.left=left+'px';cpBox.style.top=top+'px';var svgRect=el.querySelector('rect'),cc=svgRect?svgRect.getAttribute('fill'):'#ff0000';if(cc){var hsv=hex2hsv(cc);cpH=hsv[0];cpS=hsv[1];cpV=hsv[2];cpA=1}svCX=cpS;svTX=cpS;svCY=1-cpV;svTY=1-cpV;hCY=cpH;hTY=cpH;aCY=1-cpA;updateCP();svTh.style.left=(svCX*100)+'%';svTh.style.top=(svCY*100)+'%';var hH=hueTr.getBoundingClientRect().height||152,aH=aTr.getBoundingClientRect().height||152;hueTh.style.top=(hCY*hH)+'px';aTh.style.top=(aCY*aH)+'px';cpOl.classList.add('open')}
cpOl.addEventListener('mousedown',e=>{if(e.target===cpOl){cpOl.classList.remove('open');if(cpTarget)sendFinalColor()}});
cpOl.addEventListener('touchstart',e=>{if(e.target===cpOl){cpOl.classList.remove('open');if(cpTarget)sendFinalColor()}},{passive:true});
function sendFinalColor(){if(!cpTarget)return;var rgb=h2r(cpH,cpS,cpV),hex=r2h(rgb[0],rgb[1],rgb[2]);sendColor(cpTarget,hex);sendAlpha(cpTarget,cpA)}
function sendColor(el,hex){if(!currentState)return;currentState.colors[el.dataset.k]=hex;updateState(currentState)}
function sendAlpha(el,val){if(!currentState)return;const ak=el.dataset.k.replace('color','alpha');currentState.alphas[ak]=parseFloat(val.toFixed(4));updateState(currentState)}

init(); resizeCanvas(); scheduleRender();
</script>
