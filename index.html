<script>

const SUPA_URL = "https://gkzxuerurfedfwuxhimf.supabase.co";
const SUPA_KEY = "sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6";
const client = supabase.createClient(SUPA_URL, SUPA_KEY);
const PREVIEW_IMG_URL = 'https://media.discordapp.net/attachments/1184323047931531294/1519504042357817424/Screenshot_111.png?ex=6a3dcbea&is=6a3c7a6a&hm=95ab23192fdc65d73e612fadc773aac107802e9a93602097a289073aabc498b2&=&format=webp&quality=lossless&width=800&height=968';

let sessionId = null;

let bgImage = null;
let isUpdatingLocally = false; // TRAVA PARA EVITAR BUG DE TOGGLE

// ============================================
// CURSOR (INICIA IMEDIATAMENTE)
// ============================================
(function(){
    const cur = document.getElementById('cur');
    if(!cur || window.innerWidth <= 900) return; 
    
    let mx = window.innerWidth/2, my = window.innerHeight/2;

})();

// ============================================
// INICIALIZAÇÃO
// ============================================
window.onload = async function(){
    if(PREVIEW_IMG_URL){
        bgImage = new Image();
        bgImage.crossOrigin = "Anonymous";
        bgImage.src = PREVIEW_IMG_URL;
        bgImage.onload = () => scheduleRender();
    }

    const token = new URLSearchParams(window.location.search).get('token');
    if(!token){ showLoginError("Token não encontrado"); return; }
    
    try{
        const {data, error} = await client.from('n3sk').select('*').eq('token', token).eq('is_active', true).single();
        if(error || !data){ showLoginError("Token inválido ou expirado"); return; }
        
        sessionId = data.id;
        isGlobal = data.is_global;
        
        if(!isGlobal && data.ip && data.ip !== "UNKNOWN"){
            try{
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                if(ipData.ip !== data.ip){ showLoginError("Acesso negado - Dispositivo diferente"); return; }

        scheduleRender();
    }catch(e){ showLoginError("Erro: "+e.message); }

function showLoginError(msg){

    document.getElementById('login-loader').style.display = 'none';
    document.querySelector('.login-card').style.borderColor = 'var(--red)';
}

// ============================================
// TOGGLES (BLINDADO CONTRA BUG)
// ============================================
function toggleSwitch(el, key){
    // Trava visual imediata
    el.classList.toggle('on');

    // Envia estado imediatamente
    sendState();
}

// ============================================
// COLOR PICKER (CURSOR CUSTOM + SMOOTH + TEMPO REAL MELHORADO)
// ============================================
let cpTarget = null;
let cpH = 0, cpS = 1, cpV = 1, cpA = 1;
let svTX = 1, svTY = 0, svCX = 1, svCY = 0;
let hTY = 0, hCY = 0, aCY = 0;
let animRun = false;
let dSV = false, dH = false, dA = false;
let sendStateDebounce = null; // Para enviar estado em tempo real

const cpOl = document.getElementById('cpOl');
const cpBox = document.getElementById('cpBox');
const svEl = document.getElementById('sv');
const svTh = document.getElementById('svTh');
const hueTr = document.getElementById('hueTr');
const hueTh = document.getElementById('hueTh');
const aTr = document.getElementById('aTr');
const aGr = document.getElementById('aGr');
const aTh = document.getElementById('aTh');

function openColorPicker(el, defaultColor){
    cpTarget = el;
    const rect = el.getBoundingClientRect();
    
    let left = rect.right + 10;
    let top = rect.top;
    if(left + 240 > window.innerWidth) left = rect.left - 250;
    if(top + 190 > window.innerHeight) top = window.innerHeight - 200;
    if(left < 5) left = 5;
    if(top < 5) top = 5;
    
    cpBox.style.left = left + 'px';
    cpBox.style.top = top + 'px';
    
    const currentColor = el.style.backgroundColor || defaultColor;
    const hex = rgbToHex(currentColor);
    const hsv = hexToHsv(hex);
    cpH = hsv[0]; cpS = hsv[1]; cpV = hsv[2]; cpA = 1;
    
    svCX = cpS; svTX = cpS;
    svCY = 1 - cpV; svTY = 1 - cpV;
    hCY = cpH; hTY = cpH;
    aCY = 1 - cpA;
    
    updateCP();
    updateHandles();
    cpOl.classList.add('open');
}

function rgbToHex(rgb){
    if(rgb.startsWith('#')) return rgb.length === 7 ? rgb : '#ff0000';
    const values = rgb.match(/\d+/g);
    if(!values) return '#ff0000';
    return '#' + values.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

function hexToHsv(hex){
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    const d = max - min;
    let h = 0;
    if(d !== 0){
        switch(max){
            case r: h = ((g-b)/d)%6; break;
            case g: h = (b-r)/d + 2; break;
            case b: h = (r-g)/d + 4; break;
        }
    }
    h = h < 0 ? h + 6 : h;
    return [h/6, max === 0 ? 0 : d/max, max];
}

function hsvToRgb(h,s,v){
    let r,g,b;
    const i = Math.floor(h*6);
    const f = h*6 - i;
    const p = v*(1-s);
    const q = v*(1-f*s);
    const t = v*(1-(1-f)*s);
    switch(i%6){
        case 0: r=v; g=t; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

function rgbToHex2(r,g,b){ return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }

function updateCP(){
    const rgb = hsvToRgb(cpH, cpS, cpV);
    const hex = rgbToHex2(rgb[0], rgb[1], rgb[2]);
    const hRgb = hsvToRgb(cpH, 1, 1);
    const hHex = rgbToHex2(hRgb[0], hRgb[1], hRgb[2]);
    
    svEl.style.background = hHex;
    svTh.style.background = hex;
    aGr.style.background = 'linear-gradient(to bottom,'+hHex+',transparent)';
    hueTh.style.background = hHex;
    aTh.style.background = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+cpA+')';
    
    if(cpTarget){
        cpTarget.style.background = hex;
        scheduleRender();
    }
}

function updateHandles(){
    svTh.style.left = (svCX*100)+'%';
    svTh.style.top = (svCY*100)+'%';
    const hH = hueTr.getBoundingClientRect().height || 152;
    const aH = aTr.getBoundingClientRect().height || 152;
    hueTh.style.top = (hCY*hH)+'px';
    aTh.style.top = (aCY*aH)+'px';
}

function runAnim(){
    const sp = 0.25; 
    svCX += (svTX - svCX) * sp;
    svCY += (svTY - svCY) * sp;
    hCY += (hTY - hCY) * sp;
    updateHandles();
    if(Math.abs(svCX-svTX)>0.0005 || Math.abs(svCY-svTY)>0.0005 || Math.abs(hCY-hTY)>0.0005)
        requestAnimationFrame(runAnim);
    else animRun = false;
}

function startAnim(){ if(!animRun){ animRun = true; requestAnimationFrame(runAnim); } }
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

// Event Listeners Color Picker
cpOl.addEventListener('mousedown', e => { if(e.target === cpOl){ cpOl.classList.remove('open'); sendState(); } });
svEl.addEventListener('mousedown', e => { e.preventDefault(); dSV = true; doSV(e); });
hueTr.addEventListener('mousedown', e => { e.preventDefault(); dH = true; doH(e); });
aTr.addEventListener('mousedown', e => { e.preventDefault(); dA = true; doA(e); });

document.addEventListener('mousemove', e => { 
    if(dSV) doSV(e); 
    if(dH) doH(e); 
    if(dA) doA(e); 
});
document.addEventListener('mouseup', () => { 
    const wasDragging = dSV || dH || dA;
    dSV = false; dH = false; dA = false; 
    if(wasDragging) sendState(); 
});

function doSV(e){
    const r = svEl.getBoundingClientRect();
    cpS = clamp((e.clientX - r.left)/r.width, 0, 1);
    cpV = clamp(1 - (e.clientY - r.top)/r.height, 0, 1);
    svTX = cpS; svTY = 1 - cpV;
    updateCP(); // Atualiza EM TEMPO REAL enquanto arrasta
    sendRealTimeState(); // Envia estado em tempo real
    startAnim();
}

function doH(e){
    const r = hueTr.getBoundingClientRect();
    cpH = clamp((e.clientY - r.top)/r.height, 0, 0.9999);
    hTY = cpH;
    updateCP(); // Atualiza EM TEMPO REAL
    sendRealTimeState(); // Envia estado em tempo real
    startAnim();
}

function doA(e){
    const r = aTr.getBoundingClientRect();
    const height = r.height || 152;
    cpA = clamp(1 - (e.clientY - r.top)/height, 0, 1);
    aCY = 1 - cpA;
    updateHandles(); 
    updateCP(); // Atualiza EM TEMPO REAL
    sendRealTimeState(); // Envia estado em tempo real
}

// Função para enviar estado em tempo real (sem debounce - imediato)
function sendRealTimeState(){
    // Cancela timeout anterior se existir
    if(sendStateDebounce) clearTimeout(sendStateDebounce);
    // Envia imediatamente
    sendState();
}

// Touch support
function tm(e){ return {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY}; }
svEl.addEventListener('touchstart', e => { e.preventDefault(); dSV=true; doSV(tm(e)); }, {passive:false});
hueTr.addEventListener('touchstart', e => { e.preventDefault(); dH=true; doH(tm(e)); }, {passive:false});
aTr.addEventListener('touchstart', e => { e.preventDefault(); dA=true; doA(tm(e)); }, {passive:false});
document.addEventListener('touchmove', e => { 
    if(dSV||dH||dA){ e.preventDefault(); const m=tm(e); if(dSV)doSV(m); if(dH)doH(m); if(dA)doA(m); } 
}, {passive:false});
document.addEventListener('touchend', () => { 
    const wasDragging = dSV || dH || dA;
    dSV=false; dH=false; dA=false; 
    if(wasDragging) sendState(); 
});

// ============================================
// SYNC & STATE (ZERO DELAY + PROTEÇÃO)
// ============================================
async function startSync(){
    setInterval(async () => {
        if(!sessionId) return;
        const {data, error} = await client.from('n3sk').select('state, is_active').eq('id', sessionId).single();
        if(error || !data || !data.is_active){ location.reload(); return; }
        if(data.state) applyState(data.state);
    }, 100); // Sincroniza a cada 100ms para update em tempo real
}

async function sendState(){
    if(!sessionId) return;
    
    // Bloqueia o sync temporariamente para evitar conflito visual (reduzido para 150ms)
    isUpdatingLocally = true;
    setTimeout(() => { isUpdatingLocally = false; }, 150);

    const state = {
        toggles: {
            box: document.getElementById('tgl-box').classList.contains('on'),
            skeleton: document.getElementById('tgl-skeleton').classList.contains('on'),
            snapline: document.getElementById('tgl-snapline').classList.contains('on'),
            healthbar: document.getElementById('tgl-healthbar').classList.contains('on')
        },
        colors: {
            boxcolor: rgbToHex(document.getElementById('sw-boxcolor').style.backgroundColor),
            skeletoncolor: rgbToHex(document.getElementById('sw-skeletoncolor').style.backgroundColor),
            snaplinecolor: rgbToHex(document.getElementById('sw-snaplinecolor').style.backgroundColor),
            healthbarcolor: rgbToHex(document.getElementById('sw-healthbarcolor').style.backgroundColor)
        },
        alphas: { boxalpha: cpA, skeletonalpha: 1, snaplinealpha: 1, healthbaralpha: 1 }
    };
    await client.from('n3sk').update({state}).eq('id', sessionId);
}

function applyState(s){
    // Se estivermos atualizando localmente, ignora o sync para não causar glitch
    if(isUpdatingLocally) return;

    setConn(true);
    if(s.toggles){
        const map = {box:'tgl-box', skeleton:'tgl-skeleton', snapline:'tgl-snapline', healthbar:'tgl-healthbar'};
        for(let k in map){
            const el = document.getElementById(map[k]);
            if(el) el.classList.toggle('on', !!s.toggles[k]);
        }
    }
    if(s.colors){
        const map = {boxcolor:'sw-boxcolor', skeletoncolor:'sw-skeletoncolor', snaplinecolor:'sw-snaplinecolor', healthbarcolor:'sw-healthbarcolor'};
        for(let k in map){
            const el = document.getElementById(map[k]);
            if(el && s.colors[k]) el.style.background = s.colors[k];
        }
    }
    scheduleRender();
}

function setConn(c){
    document.getElementById('dot').classList.toggle('on', c);
    document.getElementById('txt').classList.toggle('on', c);
    document.getElementById('txt').textContent = c ? 'CONECTADO' : 'OFFLINE';
}

// ============================================
// QR CODE
// ============================================
function showQR(){
    const globalId = sessionId.includes('_GLOBAL') ? sessionId : sessionId + '_GLOBAL';
    
    client.from('n3sk').select('token').eq('id', globalId).single()
    .then(({data, error}) => {
        if(data && data.token){
            const globalLink = `https://n3sk.xyz/?token=${data.token}`;
            document.getElementById('qr-modal').classList.add('active');
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: globalLink,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        } else {
            alert("Token global não encontrado.");
        }
    });
}

function closeQR(){ document.getElementById('qr-modal').classList.remove('active'); }

// ============================================
// PREVIEW CANVAS (HEALTHBAR ESTÁTICO)
// ============================================
const canvas = document.getElementById('cvs');
const ctx = canvas.getContext('2d', {alpha:false});
let canvasWidth = 0, canvasHeight = 0, renderScheduled = false;
let boxOpacity = 0, targetBoxOpacity = 0;

function resizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();
    const nw = rect.width, nh = rect.height - 35;
    const dpr = window.devicePixelRatio || 1;
    if(canvasWidth !== nw || canvasHeight !== nh){
        canvas.width = nw * dpr;
        canvas.height = nh * dpr;
        canvas.style.width = nw + 'px';
        canvas.style.height = nh + 'px';
        ctx.scale(dpr, dpr);
        canvasWidth = nw;
        canvasHeight = nh;
        scheduleRender();
    }
}
window.addEventListener('resize', resizeCanvas);

function scheduleRender(){
    if(!renderScheduled){
        renderScheduled = true;
        requestAnimationFrame(renderPreview);
    }
}

function lerp(a,b,t){ return a + (b-a)*t; }

function renderPreview(){
    renderScheduled = false;
    if(!canvasWidth || !canvasHeight) return;
    
    ctx.save();
    ctx.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    if(bgImage && bgImage.complete && bgImage.naturalWidth > 0){
        const s = Math.min(canvasWidth/bgImage.width, canvasHeight/bgImage.height);
        const w = bgImage.width * s, h = bgImage.height * s;
        ctx.drawImage(bgImage, (canvasWidth-w)/2, (canvasHeight-h)/2, w, h);
    }
    
    const isBox = document.getElementById('tgl-box').classList.contains('on');
    const isHp = document.getElementById('tgl-healthbar').classList.contains('on');
    
    const bH = canvasHeight * 0.75;
    const bW = bH * 0.45;
    const bX = (canvasWidth - bW) / 2;
    const bY = (canvasHeight - bH) / 2 + 20;
    
    // Box ESP
    targetBoxOpacity = isBox ? 1 : 0;
    boxOpacity = lerp(boxOpacity, targetBoxOpacity, 0.1);
    
    if(boxOpacity > 0.01){
        ctx.globalAlpha = boxOpacity;
        ctx.strokeStyle = document.getElementById('sw-boxcolor').style.backgroundColor || '#ff0000';
        ctx.lineWidth = 2;
        const l = bW * 0.25;
        
        ctx.beginPath();
        ctx.moveTo(bX, bY+l); ctx.lineTo(bX, bY); ctx.lineTo(bX+l, bY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(bX+bW-l, bY); ctx.lineTo(bX+bW, bY); ctx.lineTo(bX+bW, bY+l);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(bX, bY+bH-l); ctx.lineTo(bX, bY+bH); ctx.lineTo(bX+l, bY+bH);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(bX+bW-l, bY+bH); ctx.lineTo(bX+bW, bY+bH); ctx.lineTo(bX+bW, bY+bH-l);
        ctx.stroke();
        
        ctx.globalAlpha = 1;
    }
    
    // Healthbar ESP (ESTÁTICO - SEM ANIMAÇÃO DE PULSO)
    if(isHp){
        const bw = 6, bx = bX - 12;
        
        ctx.fillStyle = 'rgba(15,15,15,0.8)';
        ctx.fillRect(bx, bY, bw, bH);
        
        ctx.fillStyle = document.getElementById('sw-healthbarcolor').style.backgroundColor || '#00ff00';
        ctx.fillRect(bx, bY, bw, bH); // Barra cheia e estática
    }
    
    ctx.restore();
    if(Math.abs(boxOpacity - targetBoxOpacity) > 0.01 || isHp) scheduleRender();
}
</script>
