<script>
const PREVIEW_IMG_URL = 'https://media.discordapp.net/attachments/1184323047931531294/1519504042357817424/Screenshot_111.png?ex=6a3dcbea&is=6a3c7a6a&hm=95ab23192fdc65d73e612fadc773aac107802e9a93602097a289073aabc498b2&=&format=webp&quality=lossless&width=800&height=968';
const SUPA_URL = 'https://gkzxuerurfedfwuxhimf.supabase.co';
const SUPA_KEY = 'sb_publishable_JiinWFKDmAz_lU6f8KVQOQ_nNywVbb6';
const TABLE = 'n3sk';

// Lê parâmetros da URL
const urlParams = new URLSearchParams(window.location.search);
window.SESSION_ID = urlParams.get('id');
window.SESSION_TOKEN = urlParams.get('token');

// --- DIAGNÓSTICO VISUAL NA TELA DE ESPERA ---
function updateStatus(msg, isError = false) {
    const el = document.getElementById('status-msg');
    if(el) {
        el.innerText = msg;
        el.style.color = isError ? '#ff4444' : '#555';
    }
    console.log(isError ? "[ERRO] " + msg : "[INFO] " + msg);
}

// Verifica se tem ID/Token logo ao abrir
if (!window.SESSION_ID || !window.SESSION_TOKEN) {
    updateStatus("ERRO: ID ou Token não encontrados na URL!", true);
} else {
    updateStatus(`Buscando sessão: ${window.SESSION_ID}...`);
}

// ... [MANTENHA TODO O CÓDIGO DE CURSOR, CANVAS E COLOR PICKER AQUI IGUAL AO ANTERIOR] ...
// (Para economizar espaço, assuma que o CSS e HTML de cursor/canvas continuam iguais)

// --- LÓGICA DE CONEXÃO CORRIGIDA ---
let currentState = null;
let isConnected = false;
let lastPollTime = 0;

async function fetchState() {
    try {
        const url = `${SUPA_URL}/rest/v1/${TABLE}?id=eq.${window.SESSION_ID}&select=state,token`;
        const res = await fetch(url, {
            headers: { 
                'apikey': SUPA_KEY, 
                'Authorization': `Bearer ${SUPA_KEY}`,
                'Content-Type': 'application/json' // Importante para Supabase
            }
        });
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        
        // Debug: Mostra no console o que voltou do banco
        console.log("Resposta Supabase:", JSON.stringify(data).substring(0, 100) + "...");

        if (data.length > 0 && data[0].state) {
            return data[0].state;
        }
        return null;
    } catch(e) { 
        updateStatus(`Falha na conexão: ${e.message}`, true);
        return null; 
    }
}

async function updateState(newState) {
    try {
        await fetch(`${SUPA_URL}/rest/v1/${TABLE}`, {
            method: 'POST',
            headers: { 
                'apikey': SUPA_KEY, 
                'Authorization': `Bearer ${SUPA_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates'
            },
            body: JSON.stringify({ 
                id: window.SESSION_ID, 
                token: window.SESSION_TOKEN, 
                state: newState 
            })
        });
    } catch(e) { console.error("Update error:", e); }
}

function applyState(d){
  if(!d) return;
  
  if (!isConnected) {
      isConnected = true;
      updateStatus("Conectado! Liberando interface...");
      
      // Animação de saída da tela de espera
      const waitScreen = document.getElementById('waiting-screen');
      if(waitScreen) {
          waitScreen.style.opacity = '0';
          setTimeout(() => {
              waitScreen.style.display = 'none';
              document.getElementById('app').style.display = 'block';
          }, 500);
      }
  }

  setConn(true);
  currentState = d; 
  
  // Atualiza UI (Toggles, Cores, Alphas)
  var tm={box:'tgl-box',skeleton:'tgl-skeleton',snapline:'tgl-snapline',healthbar:'tgl-healthbar'};
  for(var k in tm){var el=document.getElementById(tm[k]);if(el)el.classList.toggle('on',!!d.toggles[k]);}
  var cm={boxcolor:'sw-boxcolor',skeletoncolor:'sw-skeletoncolor',snaplinecolor:'sw-snaplinecolor',healthbarcolor:'sw-healthbarcolor'};
  for(var k in cm){
    var el=document.getElementById(cm[k]);
    if(el&&d.colors[k]){ 
        var rect = el.querySelector('rect');
        if(rect) rect.setAttribute('fill', d.colors[k]);
    }
  }
  if(d.alphas) {
      if(d.alphas.boxalpha !== undefined) cpA = d.alphas.boxalpha;
      aCY = 1 - cpA;
      var aH=aTr.getBoundingClientRect().height||152;
      aTh.style.top=(aCY*aH)+'px';
  }
  scheduleRender();
}

function setConn(c){
  var d=document.getElementById('dot'),t=document.getElementById('txt');
  if(c){d.classList.add('on');t.classList.add('on');t.textContent='CONECTADO';}
  else{d.classList.remove('on');t.classList.remove('on');t.textContent='OFFLINE';}
}

function poll(){
  var now = Date.now();
  const interval = isConnected ? 200 : 1000;
  if (now - lastPollTime < interval) return;
  lastPollTime = now;
  
  fetchState().then(state => {
      if (state) {
          applyState(state);
      } else {
          if(!isConnected) updateStatus("Aguardando inicialização do PC...");
          else setConn(false);
      }
  });
}

// Funções de Toggle/Cor (Mantidas iguais)
function tg(el){
  if (!currentState) return;
  el.classList.toggle('on'); scheduleRender();
  const key = el.dataset.k;
  currentState.toggles[key] = el.classList.contains('on');
  updateState(currentState);
}

function sendColor(el, hex){
    if (!currentState) return;
    currentState.colors[el.dataset.k] = hex;
    updateState(currentState);
}

function sendAlpha(el, val){
    if (!currentState) return;
    const alphaKey = el.dataset.k.replace('color', 'alpha');
    currentState.alphas[alphaKey] = parseFloat(val.toFixed(4));
    updateState(currentState);
}

// Inicia Polling
poll(); setInterval(poll, 1000);
resizeCanvas(); scheduleRender();
</script>
